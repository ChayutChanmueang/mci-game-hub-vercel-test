                ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(g.car.x + g.car.width * 0.45, g.car.y, g.car.width * 0.1, g.car.height);

                ctx.fillStyle = '#991B1B'; ctx.beginPath(); ctx.roundRect(g.car.x + g.car.width * 0.1, g.car.y + g.car.height - 5, g.car.width * 0.25, 4, 2); ctx.roundRect(g.car.x + g.car.width * 0.65, g.car.y + g.car.height - 5, g.car.width * 0.25, 4, 2); ctx.fill();

                g.trees.forEach(t => {

            ];

            const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);

            const getOptionsForDifficulty = (allOptions, correct, difficulty) => {
                let numOptions = difficulty === 'EASY' ? 2 : difficulty === 'MEDIUM' ? 3 : 4;
                const distractors = allOptions.filter(opt => opt !== correct);

            const [gameState, setGameState] = useState('START');

                                    else if (option === selectedOption && option !== currentQ.correct) btnClass = "bg-red-500 text-white shadow-none opacity-50";

        function LanguageGame2({ level, onComplete, updateStats }) {
            const [gameState, setGameState] = useState('playing'); 
            const [targets, setTargets] = useState([]);
            const [sources, setSources] = useState([]);
            const [dragInfo, setDragInfo] = useState({ isDragging: false, draggedItem: null, x: 0, y: 0 });
            const dropZonesRef = useRef({});
            const startTime = useRef(Date.now());

            useEffect(() => {
                const diff = level <= 5 ? 'easy' : level <= 10 ? 'medium' : 'hard';
                const pairsCount = level <= 5 ? 4 : level <= 10 ? 5 : 6;
                let rawVocab = [...langVocabData[diff]].sort(() => Math.random() - 0.5).slice(0, pairsCount);
                
                setTargets(rawVocab.map(item => ({ ...item, matched: false, matchedWord: null })).sort(() => Math.random() - 0.5));
                setSources(rawVocab.map(item => ({ id: item.id, word: item.word })).sort(() => Math.random() - 0.5));
                startTime.current = Date.now();
            }, [level]);

            const handleDragStart = (e, item) => {
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                setDragInfo({ isDragging: true, draggedItem: item, x: touch.clientX, y: touch.clientY });
            };

            const handleDragMove = (e) => {
                if (!dragInfo.isDragging) return;
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                setDragInfo(prev => ({ ...prev, x: touch.clientX, y: touch.clientY }));
            };

            const handleDragEnd = (e) => {
                if (!dragInfo.isDragging) return;
                const touch = e.changedTouches ? e.changedTouches[0] : e;
                const x = touch.clientX; const y = touch.clientY;

                let matchedId = null;
                Object.keys(dropZonesRef.current).forEach(targetId => {
                    const el = dropZonesRef.current[targetId];
                    if (el) {
                        const rect = el.getBoundingClientRect();
                        if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                            matchedId = parseInt(targetId);
                        }
                    }
                });

                if (matchedId && matchedId === dragInfo.draggedItem.id) {
                    setTargets(prev => prev.map(t => t.id === matchedId ? { ...t, matched: true, matchedWord: dragInfo.draggedItem.word } : t));
                    setSources(prev => {
                        const newSources = prev.filter(s => s.id !== dragInfo.draggedItem.id);
                        if (newSources.length === 0) {
                            // Win
                            updateStats(100 + (level * 10), (Date.now() - startTime.current) / 1000);
                            setTimeout(onComplete, 800);
                        }
                        return newSources;
                    });
                }
                setDragInfo({ isDragging: false, draggedItem: null, x: 0, y: 0 });
            };

            useEffect(() => {
                if (dragInfo.isDragging) {
                    window.addEventListener('pointermove', handleDragMove);
                    window.addEventListener('pointerup', handleDragEnd);
                    window.addEventListener('touchmove', handleDragMove, { passive: false });
                    window.addEventListener('touchend', handleDragEnd);
                }
                return () => {
                    window.removeEventListener('pointermove', handleDragMove);
                    window.removeEventListener('pointerup', handleDragEnd);
                    window.removeEventListener('touchmove', handleDragMove);
                    window.removeEventListener('touchend', handleDragEnd);
                };
            }, [dragInfo.isDragging]);

            return (
                <div className="flex flex-col h-full bg-green-50 w-full relative font-kanit">
                    <div className="p-4 text-center bg-white shadow-sm shrink-0 z-10"><h2 className="text-2xl font-bold text-green-700">ลากวางคำศัพท์</h2></div>
                    
                    <div className="flex-1 overflow-y-auto p-4 min-h-0">
                        <div className="grid grid-cols-2 gap-3 pb-20">
                            {targets.map(target => (
                                <div key={target.id} ref={el => dropZonesRef.current[target.id] = el}
                                    className={`relative flex flex-col items-center p-3 rounded-2xl border-[3px] transition-all shadow-sm ${target.matched ? 'bg-green-100 border-green-400 scale-95' : 'bg-white border-slate-200 border-dashed'}`}>
                                    <div className="text-5xl mb-2 filter drop-shadow-sm">{target.emoji}</div>
                                    <div className={`w-full h-10 rounded-xl flex items-center justify-center text-base font-bold ${target.matched ? 'bg-green-500 text-white shadow-sm' : 'bg-slate-100'}`}>
                                        {target.matched ? target.matchedWord : <div className="w-2 h-2 bg-slate-300 rounded-full"></div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="h-[30%] min-h-[160px] bg-white rounded-t-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-20 flex flex-col shrink-0 relative">
                        <div className="text-center text-xs text-slate-400 my-3 font-medium">ลากคำศัพท์ขึ้นไปวาง</div>
                        <div className="flex-1 overflow-y-auto px-4 pb-4">
                            <div className="flex flex-wrap gap-2 justify-center content-start">
                                {sources.map(source => (
                                    <div key={source.id} onPointerDown={(e) => handleDragStart(e, source)}
                                        className={`px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-[0_2px_0_rgb(226,232,240)] text-slate-700 font-bold text-lg cursor-grab touch-none select-none ${dragInfo.draggedItem?.id === source.id ? 'opacity-0' : 'opacity-100'}`}>
                                        {source.word}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {dragInfo.isDragging && (
                        <div className="fixed pointer-events-none z-50 px-5 py-2.5 bg-blue-600 text-white font-bold text-lg rounded-xl shadow-2xl transform -translate-x-1/2 -translate-y-1/2 whitespace-nowrap" style={{ left: dragInfo.x, top: dragInfo.y }}>
                            {dragInfo.draggedItem.word}
                        </div>
                    )}
                </div>
            );
        }

        // --- NEW: Language Line Game ---
        function LanguageGame3({ level, onComplete, updateStats }) {
            const [targets, setTargets] = useState([]);
            const [sources, setSources] = useState([]);
            const [lines, setLines] = useState([]);
            const [drawingLine, setDrawingLine] = useState(null);
            const lineContentRef = useRef(null);
            const pointRefs = useRef({});
            const startTime = useRef(Date.now());

            useEffect(() => {
                const diff = level <= 5 ? 'easy' : level <= 10 ? 'medium' : 'hard';
                const pairsCount = level <= 5 ? 4 : level <= 10 ? 5 : 6;
                let rawVocab = [...langVocabData[diff]].sort(() => Math.random() - 0.5).slice(0, pairsCount);
                
                setTargets(rawVocab.map(item => ({ ...item })).sort(() => Math.random() - 0.5));
                setSources(rawVocab.map(item => ({ id: item.id, word: item.word })).sort(() => Math.random() - 0.5));
                startTime.current = Date.now();
            }, [level]);

            const getPointCoordinates = (id, type) => {
                const el = pointRefs.current[`${type}-${id}`];
                const wrapper = lineContentRef.current;
                if (el && wrapper) {
                    const elRect = el.getBoundingClientRect();
                    const wrapperRect = wrapper.getBoundingClientRect();
                    return { x: elRect.left - wrapperRect.left + elRect.width / 2, y: elRect.top - wrapperRect.top + elRect.height / 2 };
                }
                return { x: 0, y: 0 };
            };

            const handleLineStart = (e, id, type) => {
                e.preventDefault(); e.stopPropagation();
                if (!lines.find(l => l.startId === id || l.endId === id)) {
                    const coords = getPointCoordinates(id, type);
                    setDrawingLine({ startId: id, startType: type, startX: coords.x, startY: coords.y, endX: coords.x, endY: coords.y });
                }
            };

            const handleLineMove = (e) => {
                if (drawingLine && lineContentRef.current) {
                    e.preventDefault();
                    const touch = e.touches ? e.touches[0] : e;
                    const wrapperRect = lineContentRef.current.getBoundingClientRect();
                    setDrawingLine(prev => ({ ...prev, endX: touch.clientX - wrapperRect.left, endY: touch.clientY - wrapperRect.top }));
                }
            };

            const handleLineEnd = (e) => {
                if (!drawingLine) return;
                const touch = e.changedTouches ? e.changedTouches[0] : e;
                const x = touch.clientX; const y = touch.clientY;
                let matchedId = null;
                const targetType = drawingLine.startType === 'img' ? 'word' : 'img';

                Object.keys(pointRefs.current).forEach(key => {
                    if (key.startsWith(targetType)) {
                        const el = pointRefs.current[key];
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (x >= rect.left - 30 && x <= rect.right + 30 && y >= rect.top - 30 && y <= rect.bottom + 30) {
                                matchedId = parseInt(key.split('-')[1]);
                            }
                        }
                    }
                });

                if (matchedId === drawingLine.startId) {
                    const endCoords = getPointCoordinates(matchedId, targetType);
                    setLines(prev => {
                        const newLines = [...prev, { startId: drawingLine.startId, startX: drawingLine.startX, startY: drawingLine.startY, endX: endCoords.x, endY: endCoords.y, color: '#22c55e' }];
                        if (newLines.length === targets.length) {
                            updateStats(100 + (level * 10), (Date.now() - startTime.current) / 1000);
                            setTimeout(onComplete, 800);
                        }
                        return newLines;
                    });
                }
                setDrawingLine(null);
            };

            useEffect(() => {
                if (drawingLine) {
                    window.addEventListener('pointermove', handleLineMove);
                    window.addEventListener('pointerup', handleLineEnd);
                    window.addEventListener('touchmove', handleLineMove, { passive: false });
                    window.addEventListener('touchend', handleLineEnd);
                }
                return () => {
                    window.removeEventListener('pointermove', handleLineMove);
                    window.removeEventListener('pointerup', handleLineEnd);
                    window.removeEventListener('touchmove', handleLineMove);
                    window.removeEventListener('touchmove', handleLineEnd);
                };
            }, [drawingLine]);

            return (

                    <div className="flex-1 overflow-y-auto relative w-full touch-none">

                                {drawingLine && <line x1={drawingLine.startX} y1={drawingLine.startY} x2={drawingLine.endX} y2={drawingLine.endY} stroke="#6366f1" strokeWidth="6" strokeLinecap="round" strokeDasharray="10,10" />}
                            </svg>
                            <div className="flex flex-col gap-6 w-1/2 z-20 py-4 pr-2">

                                            <div ref={el => pointRefs.current[`img-${item.id}`] = el} onPointerDown={(e) => handleLineStart(e, item.id, 'img')} className={`absolute -right-4 w-8 h-8 rounded-full border-4 z-30 flex items-center justify-center shadow-md bg-white cursor-pointer ${isMatched ? 'border-green-500' : 'border-indigo-400'}`}><div className={`w-3 h-3 rounded-full ${isMatched ? 'bg-green-500' : 'bg-indigo-400'}`}></div></div>
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="w-12 shrink-0"></div>
                            <div className="flex flex-col gap-6 w-1/2 z-20 py-4 pl-2">
                                {sources.map(item => {
                                    const isMatched = lines.some(l => l.startId === item.id);
                                    return (

                                            <div ref={el => pointRefs.current[`word-${item.id}`] = el} onPointerDown={(e) => handleLineStart(e, item.id, 'word')} className={`absolute -left-4 w-8 h-8 rounded-full border-4 z-30 flex items-center justify-center shadow-md bg-white cursor-pointer ${isMatched ? 'border-green-500' : 'border-indigo-400'}`}><div className={`w-3 h-3 rounded-full ${isMatched ? 'bg-green-500' : 'bg-indigo-400'}`}></div></div>
                                            <div className={`w-full h-full max-w-[120px] bg-white rounded-3xl shadow-sm border-[3px] flex items-center justify-center font-bold text-xl transition-all ${isMatched ? 'border-green-400 bg-green-50 text-green-800 scale-95 opacity-90' : 'border-slate-200 text-slate-700'}`}>{item.word}</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

        }

        // -----------------------------------------------------------------------------------------
        // [MODULE 5] EXECUTIVE GAMES (เกมหมวดบริหาร)
        // -----------------------------------------------------------------------------------------

        function ExecutiveGame({ level, onComplete, updateStats }) {
            const containerRef = useRef(null);

            useEffect(() => {
                const ALL_ANIMALS = ['🦁', '🐘', '🦒', '🐒', '🦓', '🐯', '🦛', '🐼', '🦊', '🐨', '🐮', '🐷', '🐸', '🐔', '🐧'];
                const LEVEL_NAMES = {1: "ฝึกหัด", 2: "ทั่วไป", 3: "เก่งมาก", 4: "เซียน"};

                let state = {
                    level: Math.max(1, Math.min(level, 4)), // Cap level logic for the UI matching 1-4
                    stage: 1,
                    rows: 1,
                    cols: 3,
                    solution: [],
                    currentBoard: [],
                    selectedAnimal: null,
                    elapsedSeconds: 0,
                    timerId: null,
                    availableAnimals: [],
                    totalScore: 0
                };

                const getPositionName = (idx) => {
                    const r = Math.floor(idx / state.cols);
                    const c = idx % state.cols;
                    if (state.rows === 1) {
                        if (state.cols === 3) return ["ซ้ายสุด", "ตรงกลาง", "ขวาสุด"][c];
                        return c === 0 ? "ซ้าย" : "ขวา";
                    }
                    if (state.rows === 2 && state.cols === 2) {
                        return `มุม${c === 0 ? "ซ้าย" : "ขวา"}${r === 0 ? "บน" : "ล่าง"}`;
                    }
                    if (state.rows === 3 && state.cols === 3) {
                        if (r === 1 && c === 1) return "ตรงกลางตาราง";
                        if (r === 0 && c === 0) return "มุมซ้ายบน";
                        if (r === 0 && c === 2) return "มุมขวาบน";
                        if (r === 2 && c === 0) return "มุมซ้ายล่าง";
                        if (r === 2 && c === 2) return "มุมขวาล่าง";
                        if (r === 0 && c === 1) return "แถวบน ตรงกลาง";
                        if (r === 2 && c === 1) return "แถวล่าง ตรงกลาง";
                        if (r === 1 && c === 0) return "แถวกลาง ด้านซ้าย";
                        if (r === 1 && c === 2) return "แถวกลาง ด้านขวา";
                    }
                    return `${["ซ้าย", "กลาง", "ขวา"][c]} แถว${["บน", "กลาง", "ล่าง"][r]}`;
                };

                const getPhrase = (type, a1, a2) => {
                    const phrases = {
                        up: [`🔼 <b>${a1}</b> อยู่ด้านบนของ <b>${a2}</b>`, `🔼 <b>${a1}</b> พักอยู่ชั้นบนของ <b>${a2}</b>`, `🔼 <b>${a2}</b> ถูก <b>${a1}</b> ทับอยู่`],
                        down: [`🔽 <b>${a1}</b> อยู่ด้านล่างของ <b>${a2}</b>`, `🔽 <b>${a1}</b> พักอยู่ใต้ <b>${a2}</b>`, `🔽 <b>${a2}</b> นั่งทับ <b>${a1}</b> อยู่`],
                        left: [`👈 <b>${a1}</b> อยู่ทางซ้ายของ <b>${a2}</b>`, `👈 <b>${a1}</b> ยืนต่อแถวซ้ายมือของ <b>${a2}</b>`, `👈 <b>${a2}</b> มี <b>${a1}</b> อยู่ด้านซ้าย`],
                        right: [`👉 <b>${a1}</b> อยู่ทางขวาของ <b>${a2}</b>`, `👉 <b>${a1}</b> ยืนต่อแถวขวามือของ <b>${a2}</b>`, `👉 <b>${a2}</b> มี <b>${a1}</b> อยู่ด้านขวา`]
                    };
                    return phrases[type][Math.floor(Math.random() * phrases[type].length)];
                };

                const formatTime = (secs) => `${Math.floor(secs/60).toString().padStart(2, '0')}:${(secs%60).toString().padStart(2, '0')}`;

                const updateTimerDisplay = () => {
                    const el = containerRef.current.querySelector('#timer-text');
                    if (el) el.innerText = formatTime(state.elapsedSeconds);
                };

                const generateHints = () => {
                    const sol = state.solution;
                    const list = containerRef.current.querySelector('#hint-list');
                    if (!list) return;
                    
                    const hints = [];
                    const total = state.rows * state.cols;
                    const visited = new Set();
                    
                    let rootIdx = Math.floor(Math.random() * total);
                    if (state.rows === 3 && state.cols === 3) {
                        const easyStarts = [0, 2, 4, 6, 8];
                        rootIdx = easyStarts[Math.floor(Math.random() * easyStarts.length)];
                    } else if (state.rows === 1) {
                        rootIdx = Math.floor(Math.random() * 3);
                    }

                    visited.add(rootIdx);
                    hints.push(`📍 <span class="text-emerald-700 font-bold">${sol[rootIdx]}</span> อยู่ที่ <b>${getPositionName(rootIdx)}</b>`);

                    while (visited.size < total - 1) {
                        const candidates = [];
                        visited.forEach(u => {
                            const r = Math.floor(u / state.cols);
                            const c = u % state.cols;
                            const neighbors = [
                                { idx: u - state.cols, dir: 'up' },
                                { idx: u + state.cols, dir: 'down' },
                                { idx: u - 1, dir: 'left', valid: c > 0 },
                                { idx: u + 1, dir: 'right', valid: c < state.cols - 1 }
                            ];
                            neighbors.forEach(n => {
                                if (n.idx >= 0 && n.idx < total && !visited.has(n.idx)) {
                                    if ((n.dir === 'left' || n.dir === 'right') && !n.valid) return;
                                    candidates.push({ u: u, v: n.idx, dir: n.dir });
                                }
                            });
                        });

                        if (candidates.length === 0) break;

                        const pick = candidates[Math.floor(Math.random() * candidates.length)];
                        hints.push(getPhrase(pick.dir, sol[pick.v], sol[pick.u]));
                        visited.add(pick.v);
                    }
                    
                    hints.push(`<li class="bg-amber-50 text-amber-800 p-2 rounded-lg text-sm border border-amber-200 mt-2">💡 ตัวสุดท้ายไม่มีคำใบ้ ต้องหาที่ว่างเองนะครับ</li>`);
                    list.innerHTML = hints.map(h => h.startsWith('<li') ? h : `<li class="pl-2 border-l-4 border-emerald-200">${h}</li>`).join('');
                };

                const onSlotClick = (idx) => {
                    if (!state.selectedAnimal) return;
                    const prevIdx = state.currentBoard.indexOf(state.selectedAnimal);
                    if (prevIdx !== -1) {
                        state.currentBoard[prevIdx] = null;
                        const prevSlot = containerRef.current.querySelectorAll('.slot')[prevIdx];
                        if(prevSlot) {
                            prevSlot.innerHTML = `<span class="opacity-20 text-slate-300 font-bold select-none text-[30%]">${prevIdx+1}</span>`;
                            prevSlot.classList.remove('active');
                        }
                    }
                    state.currentBoard[idx] = state.selectedAnimal;
                    const slot = containerRef.current.querySelectorAll('.slot')[idx];
                    if(slot) {
                        slot.innerText = state.selectedAnimal;
                        slot.classList.add('active');
                    }
                };

                const renderGrid = () => {
                    const grid = containerRef.current.querySelector('#game-grid');
                    const wrapper = containerRef.current.querySelector('#grid-wrapper');
                    if (!grid || !wrapper) return;

                    grid.innerHTML = '';
                    const availWidth = wrapper.clientWidth - 10;
                    const availHeight = wrapper.clientHeight - 10;
                    const gap = 8;
                    const totalGapW = (state.cols - 1) * gap;
                    const totalGapH = (state.rows - 1) * gap;
                    const maxCellW = (availWidth - totalGapW) / state.cols;
                    const maxCellH = (availHeight - totalGapH) / state.rows;
                    const cellSize = Math.floor(Math.min(maxCellW, maxCellH));
                    
                    grid.style.gridTemplateColumns = `repeat(${state.cols}, ${cellSize}px)`;
                    grid.style.gridTemplateRows = `repeat(${state.rows}, ${cellSize}px)`;
                    grid.style.gap = `${gap}px`;

                    const fontSize = Math.floor(cellSize * 0.6);

                    for (let i = 0; i < state.rows * state.cols; i++) {
                        const slot = document.createElement('div');
                        slot.className = 'slot';
                        slot.style.fontSize = `${fontSize}px`;
                        slot.innerHTML = `<span class="opacity-20 text-slate-300 font-bold select-none text-[30%]">${i+1}</span>`; 
                        slot.onclick = () => onSlotClick(i);
                        grid.appendChild(slot);
                    }
                };

                const onAnimalSelect = (animal) => {
                    state.selectedAnimal = animal;
                    containerRef.current.querySelectorAll('.animal-btn').forEach(b => b.classList.remove('selected'));
                    const btn = containerRef.current.querySelector(`#btn-${animal}`);
                    if(btn) btn.classList.add('selected');
                };

                const renderAnimalBank = () => {
                    const bank = containerRef.current.querySelector('#animal-bank');
                    if (!bank) return;
                    bank.innerHTML = '';
                    const count = state.availableAnimals.length;
                    bank.style.gridTemplateColumns = `repeat(${Math.min(count, 5)}, 1fr)`;

                    state.availableAnimals.forEach(animal => {
                        const btn = document.createElement('div');
                        btn.className = 'animal-btn';
                        btn.id = `btn-${animal}`;
                        btn.innerText = animal;
                        btn.onclick = () => onAnimalSelect(animal);
                        bank.appendChild(btn);
                    });
                };

                const initGameRound = () => {
                    if (state.level <= 2) { state.rows = 1; state.cols = 3; }
                    else if (state.level <= 5) { state.rows = 2; state.cols = 2; }
                    else if (state.level <= 8) { state.rows = 3; state.cols = 2; }
                    else { state.rows = 3; state.cols = 3; }

                    const totalSlots = state.rows * state.cols;
                    const shuffledAnimals = [...ALL_ANIMALS].sort(() => Math.random() - 0.5);
                    state.availableAnimals = shuffledAnimals.slice(0, totalSlots);
                    state.solution = [...state.availableAnimals].sort(() => Math.random() - 0.5);
                    state.currentBoard = new Array(totalSlots).fill(null);
                    state.selectedAnimal = null;
                    
                    const levelNameEl = containerRef.current.querySelector('#level-name');
                    const stageDisplayEl = containerRef.current.querySelector('#stage-display');
                    const gridInfoEl = containerRef.current.querySelector('#grid-info');
                    if(levelNameEl) levelNameEl.innerText = LEVEL_NAMES[Math.min(4, Math.ceil(level/3))] || "ทั่วไป";
                    if(stageDisplayEl) stageDisplayEl.innerText = state.stage;
                    if(gridInfoEl) gridInfoEl.innerText = `${state.rows}x${state.cols}`;
                    
                    updateTimerDisplay();
                    renderAnimalBank();
                    generateHints();
                    setTimeout(renderGrid, 50); 

                    if (state.timerId) clearInterval(state.timerId);
                    state.timerId = setInterval(() => {
                        state.elapsedSeconds++;
                        updateTimerDisplay();
                    }, 1000);
                };

                const checkAnswer = () => {
                    if (state.currentBoard.includes(null)) {
                        const app = containerRef.current.querySelector('.app-container');
                        app.classList.add('shake');
                        setTimeout(() => app.classList.remove('shake'), 400);
                        return;
                    }
                    const isCorrect = state.currentBoard.every((val, i) => val === state.solution[i]);
                    if (isCorrect) {
                        clearInterval(state.timerId);
                        const baseScore = state.level * 1000;
                        const timePenalty = state.elapsedSeconds * 10;
                        const stageScore = Math.max(100, baseScore - timePenalty);
                        state.totalScore += stageScore;

                        if (state.stage < 3) {
                            state.stage++;
                            initGameRound();
                        } else {
                            // Win!
                            updateStats(state.totalScore, state.elapsedSeconds);
                            onComplete();
                        }
                    } else {
                        const app = containerRef.current.querySelector('.app-container');
                        app.classList.add('shake');
                        setTimeout(() => app.classList.remove('shake'), 400);
                    }
                };

                // Expose checkAnswer to window so inline onclick can use it if needed, or attach it manually
                const btn = containerRef.current.querySelector('#check-btn');
                if(btn) btn.onclick = checkAnswer;

                initGameRound();

                const handleResize = () => renderGrid();
                window.addEventListener('resize', handleResize);
                return () => {
                    clearInterval(state.timerId);
                    window.removeEventListener('resize', handleResize);
                };
            }, [level]);

            return (
                <div ref={containerRef} className="w-full h-full">
                    <div className="app-container" style={{ borderRadius: 0, border: 'none', boxShadow: 'none', maxWidth: 'none', height: '100%' }}>
                        <header className="hud-bar">
                            <div className="flex flex-col mr-auto">
                                <span className="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">ระดับ <span id="level-name">ฝึกหัด</span></span>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-2xl font-black text-slate-800">ด่าน <span id="stage-display">1</span>/3</span>
                                    <span className="text-xs text-slate-400 font-medium" id="grid-info">1x3</span>
                                </div>
                            </div>
                            <div className="flex flex-col items-end">
                                <span className="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">เวลา</span>
                                <div className="flex items-center gap-1 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-100">
                                    <span className="text-sm">⏱️</span>
                                    <span id="timer-text" className="text-lg font-mono font-bold text-emerald-700">00:00</span>
                                </div>
                            </div>
                        </header>
                        <main className="game-content">
                            <section className="clues-card">
                                <div className="clues-header">
                                    <span className="text-xl mr-2">🕵️</span>
                                    <h2 className="font-bold text-emerald-900 text-base">ข้อมูลนักสืบ (ทำตามลำดับ)</h2>
                                </div>
                                <div className="clues-list-wrapper">
                                    <ul id="hint-list" className="space-y-3 text-lg text-slate-700 font-medium list-none pb-2"></ul>
                                </div>
                            </section>
                            <div className="grid-wrapper" id="grid-wrapper">
                                <section className="grid-layout" id="game-grid"></section>
                            </div>
                        </main>
                        <footer className="controls">
                            <div id="animal-bank" className="animal-bank"></div>
                            <button id="check-btn" className="action-btn">ส่งคำตอบ</button>
                        </footer>
                    </div>
                </div>
            );
        }

                            <div className="text-4xl">🍳</div>
                            <div>
                                <p className="text-sm text-slate-500">เมนู:</p>
                                <h2 className="text-lg font-bold text-orange-800">ข้าวผัดหมู (ตัวอย่าง)</h2>
                            </div>
                        </div>
                    </header>

                    <div className="flex p-2 gap-2 overflow-x-auto">
                        {['meat', 'veg', 'dry'].map(cat => (
                            <button key={cat} onClick={() => setActiveCategory(cat)} 
                                className={`flex-1 py-2 rounded-xl font-bold border-b-4 ${activeCategory === cat ? 'bg-orange-500 text-white border-orange-700' : 'bg-white text-slate-500 border-slate-200'}`}>
                                {cat === 'meat' ? '🥩 เนื้อ' : cat === 'veg' ? '🥬 ผัก' : '🧂 แห้ง'}
                            </button>
                        ))}
                    </div>

                    <main className="flex-1 overflow-y-auto p-4 bg-stone-100 grid grid-cols-2 gap-4 pb-24">
                        {shelfItems.filter(i => i.cat === activeCategory).map(item => {
                            const isSelected = cart.some(c => c.id === item.id);
                            return (
                                <button key={item.id} onClick={() => toggleItem(item)}
                                    className={`p-3 rounded-2xl flex flex-col items-center justify-between h-48 border-4 transition-all relative ${isSelected ? 'bg-green-50 border-green-500 shadow-md' : 'bg-white border-stone-200 shadow-sm'}`}>
                                    {isSelected && <div className="absolute top-2 right-2 text-green-500">✅</div>}
                                    <div className="text-5xl mt-2">{item.icon}</div>
                                    <div className="text-center">
                                        <div className="font-bold text-slate-700 text-sm">{item.name}</div>
                                        <div className="text-xs text-yellow-500">{'⭐'.repeat(item.q)}</div>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-lg py-1 text-center font-bold text-blue-600">฿{item.price}</div>
                                </button>
                            );
                        })}
                    </main>

                    <footer className="absolute bottom-0 w-full bg-white border-t-4 border-orange-500 p-4 shadow-lg">
                        <div className="flex justify-between mb-3 text-sm font-bold text-slate-600">
                            <span>รวม: <span className="text-blue-600 text-lg">฿{currentCost}</span></span>
                            <span>เหลือ: <span className={`${budget-currentCost < 0 ? 'text-red-500' : 'text-green-600'} text-lg`}>฿{budget - currentCost}</span></span>
                        </div>
                        <button onClick={handleCheckout} className="w-full bg-orange-500 text-white py-3 rounded-xl font-bold text-2xl shadow-lg border-b-4 border-orange-700 active:border-b-0 active:translate-y-1">ปรุงอาหาร</button>
                    </footer>
                </div>
            );
        }

        // =========================================================================================
        // 🧩 CORE SYSTEM (ระบบหลัก)
        // =========================================================================================
        
        function WelcomeScreen({ onStart }) {
            return (
                <div className="w-full h-full flex flex-col items-center justify-center bg-white relative overflow-hidden p-6 text-center">
                    <div className="absolute top-0 left-0 w-full h-1/2 bg-emerald-50 rounded-b-[3rem] z-0"></div>
                    <div className="z-10 bg-white p-8 rounded-[2.5rem] shadow-2xl mb-8 animate-pop-in border-4 border-emerald-100">
                        <div className="text-8xl mb-4 animate-bounce-slow">🦁</div>
                        <h1 className="text-4xl font-black text-emerald-800 tracking-tight leading-tight">Zoo<br /><span className="text-emerald-500">Brain Fit</span></h1>
                    </div>
                    <div className="z-10 space-y-4 w-full max-w-xs">
                        <button onClick={onStart} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-2xl font-black py-5 rounded-2xl shadow-xl shadow-emerald-200 transform transition-all active:scale-95 flex items-center justify-center gap-3">
                            <Icon path={Icons.Play} size={28} /> เลือกเกมเล่น
                        </button>
                    </div>
                    <div className="absolute bottom-6 text-slate-400 text-xs font-bold">v3.3 • All Complete Modes</div>
                </div>
            );
        }

        function SelectionScreen({ games, selectedGame, selectedModes, onSelectGame, onChangeMode, onStart, onBack }) {
            return (
                <div className="w-full h-full flex flex-col bg-slate-50 relative overflow-hidden">
                    <div className="pt-10 pb-6 px-6 bg-white rounded-b-[2.5rem] shadow-sm z-10 relative">
                        <button onClick={onBack} className="absolute top-10 left-4 p-2 rounded-full hover:bg-slate-100 text-slate-400 transition"><Icon path={Icons.ArrowLeft} size={28} /></button>
                        <div className="text-center">
                            <h1 className="text-3xl font-black text-slate-800">เลือกโหมดฝึก</h1>
                            <p className="text-slate-500 text-sm font-medium mt-1">เลือก 1 เกมเพื่อเริ่มภารกิจ</p>
                        </div>
                    </div>
                    <main className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32">
                        {Object.values(games).map(game => {
                            const isSelected = selectedGame === game.id;
                            const currentMode = selectedModes[game.id] || game.modes[0].id;
                            return (
                                <div key={game.id} onClick={() => onSelectGame(game.id)} className={`relative p-5 rounded-[2rem] border-[3px] transition-all cursor-pointer shadow-sm active:scale-[0.98] overflow-hidden ${isSelected ? `${game.activeColor} ${game.borderColor.replace('200', '500')} shadow-md transform scale-[1.02]` : 'bg-white border-transparent shadow-sm hover:border-slate-200'}`}>
                                    <div className="flex items-start gap-4 mb-4">
                                        <div className={`w-16 h-16 rounded-2xl flex items-center justify-center text-4xl shadow-inner ${game.color.replace('text-', 'bg-').split(' ')[0]} ${game.color.split(' ')[1]}`}>{game.icon}</div>
                                        <div><h3 className="text-xl font-black text-slate-800">{game.name}</h3><p className="text-sm text-slate-500 font-medium">{game.desc}</p></div>
                                    </div>
                                    <div className="flex bg-white p-1 rounded-xl relative shadow-inner border border-slate-100 flex-wrap" onClick={e => e.stopPropagation()}>
                                        {game.modes.map(mode => (
                                            <button key={mode.id} onClick={() => { onSelectGame(game.id); onChangeMode(game.id, mode.id); }} className={`flex-1 min-w-[30%] py-2 text-xs font-bold rounded-lg transition-all z-10 ${currentMode === mode.id && isSelected ? 'bg-slate-800 text-white shadow-sm' : currentMode === mode.id ? 'bg-slate-200 text-slate-600' : 'text-slate-400 hover:text-slate-600'}`}>{mode.name}</button>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </main>
                    <div className="absolute bottom-0 w-full p-6 bg-gradient-to-t from-white via-white/95 to-transparent z-20">
                        <button onClick={onStart} disabled={!selectedGame} className={`w-full py-4 rounded-2xl font-black text-xl shadow-xl flex items-center justify-center gap-2 transition-all ${selectedGame ? 'bg-emerald-600 text-white hover:bg-emerald-700 transform hover:-translate-y-1' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                            {selectedGame ? '🚀 เริ่มเกม!' : 'กรุณาเลือกเกม'}
                        </button>
                    </div>
                </div>
            );
        }

        function GameSummaryScreen({ gameName, score, onReplay, onHome }) {
            return (
                <div className="w-full h-full flex flex-col items-center justify-center bg-emerald-50 relative overflow-hidden font-kanit p-6">
                    <div className="z-10 w-full max-w-md bg-white rounded-[2.5rem] p-8 shadow-2xl text-center border-4 border-emerald-100 animate-pop-in">
                        <div className="text-6xl mb-4 animate-bounce">🎉</div>
                        <h1 className="text-3xl font-black text-slate-800 mb-2">ภารกิจสำเร็จ!</h1>
                        <p className="text-slate-500 font-bold mb-8">เกม {gameName}</p>
                        <div className="bg-yellow-50 p-4 rounded-2xl border border-yellow-100 mb-8"><div className="text-sm text-yellow-600 font-bold uppercase">คะแนนรวม</div><div className="text-4xl font-black text-yellow-500">{score}</div></div>
                        <div className="flex flex-col gap-3">
                            <button onClick={onReplay} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-xl font-bold text-xl shadow-lg active:scale-95 transition flex items-center justify-center gap-2">
                                เล่นอีกครั้ง <Icon path={Icons.Refresh} />
                            </button>
                            <button onClick={onHome} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 py-3 rounded-xl font-bold active:scale-95 transition">กลับหน้าหลัก</button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            // NEW STATE: single selection instead of array
            const [selectedGame, setSelectedGame] = useState(null);
            const [selectedModes, setSelectedModes] = useState({}); 
            const [screen, setScreen] = useState('welcome'); // welcome, selection, playing, summary
            const [lastResult, setLastResult] = useState(null);
            
            const [gameState, setGameState] = useState(() => {
                const saved = localStorage.getItem('zoo_brain_v2');
                return saved ? JSON.parse(saved) : { 
                    progress: { memory: 1, visuospatial: 1, attention: 1, language: 1, executive: 1 },
                    highScores: {}, playTime: {}, history: [] 
                };
            });

            useEffect(() => { localStorage.setItem('zoo_brain_v2', JSON.stringify(gameState)); }, [gameState]);

            const changeGameMode = (gameId, modeId) => {
                setSelectedModes(prev => ({ ...prev, [gameId]: modeId }));
            };

            const handleLevelComplete = () => {
                // Increment level
                setGameState(prev => {
                    let nextLv = (prev.progress[selectedGame] || 1) + 1;
                    return { ...prev, progress: { ...prev.progress, [selectedGame]: nextLv } };
                });
                
                // Show summary
                setLastResult({ gameName: GAMES[selectedGame].name, score: 100 }); 
                setScreen('summary');
            };

            const updateStats = (score, time) => { console.log("Stats:", score, time); };

            // -------------------------------------------------------------------------
            // 🕹️ GAME MAPPING CONFIGURATION
            // -------------------------------------------------------------------------
            const renderGameContent = () => {
                const currentGameId = selectedGame;
                const currentMode = selectedModes[currentGameId] || GAMES[currentGameId].modes[0].id;
                
                const commonProps = {
                    level: gameState.progress[currentGameId],
                    onComplete: handleLevelComplete,
                    onExit: () => setScreen('selection'),
                    updateStats: updateStats,
                    mode: currentMode
                };

                switch (currentGameId) {
                    case 'memory':
                        if (currentMode === 'walking') return <MemoryWalkingGame {...commonProps} />;
                        if (currentMode === 'lottery') return <MemoryLotteryGame {...commonProps} />;
                        return <MemoryGame {...commonProps} />;
                    
                    case 'visuospatial':
                        if (currentMode === 'organize') return <VisuospatialOrganizeGame {...commonProps} />;
                        if (currentMode === 'arrow') return <VisuospatialArrowGame {...commonProps} />;
                        return <VisuospatialGame {...commonProps} />;

                    case 'attention':
                        if (currentMode === 'driving') return <AttentionDrivingGame {...commonProps} />;
                        return <AttentionGame {...commonProps} />;

                    case 'language':
                        if (currentMode === 'drag') return <LanguageGame2 {...commonProps} />;
                        if (currentMode === 'line') return <LanguageGame3 {...commonProps} />;
                        return <LanguageGame1 {...commonProps} />; // Update to run LanguageGame1 for "game1"

                    case 'executive':
                        if (currentMode === 'shopping') return <ExecutiveShoppingGame {...commonProps} />;
                        return <ExecutiveGame {...commonProps} />;

                    default:
                        return <div className="h-full flex items-center justify-center">Game Not Found</div>;
                }
            };

            // -------------------------------------------------------------------------
            // RENDER SYSTEM
            // -------------------------------------------------------------------------
            if (screen === 'welcome') return <WelcomeScreen onStart={() => setScreen('selection')} />;
            
            if (screen === 'selection') return (
                <SelectionScreen 
                    games={GAMES} 
                    selectedGame={selectedGame} 
                    selectedModes={selectedModes} 
                    onSelectGame={setSelectedGame} 
                    onChangeMode={changeGameMode} 
                    onStart={() => setScreen('playing')} 
                    onBack={() => setScreen('welcome')} 
                />
            );

            if (screen === 'summary') return (
                <GameSummaryScreen 
                    {...lastResult} 
                    onReplay={() => setScreen('playing')} 
                    onHome={() => {
                        setSelectedGame(null);
                        setScreen('selection');
                    }} 
                />
            );

            if (screen === 'playing') {
                return (
                    <div className="w-full h-full flex flex-col font-kanit relative bg-white">
                        <div className="absolute top-0 left-0 w-full p-4 z-50 flex justify-between items-center pointer-events-none">
                            <button onClick={() => setScreen('selection')} className="bg-white/80 backdrop-blur pointer-events-auto p-2 rounded-full shadow-sm border border-slate-200 text-slate-500"><Icon path={Icons.Home} size={20} /></button>
                        </div>
                        
                        {/* Game Container */}
                        <div className="flex-1 w-full h-full relative overflow-hidden">
                            {renderGameContent()}
                        </div>
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
