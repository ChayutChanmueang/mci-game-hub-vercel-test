<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zoo Brain Training</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&family=Fredoka+One&family=Fredoka:wght@400;600;700&family=Kanit:wght@300;400;500;600;800&display=swap"
        rel="stylesheet">

    <style type="text/tailwindcss">
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #111827;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #root {
            width: 100%;
            height: 100vh;
            background-color: #f0fdf4;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 500px) {
            #root {
                width: 414px;
                height: 896px;
                max-height: 95vh;
                border-radius: 40px;
                box-shadow: 0 0 0 12px #333, 0 25px 50px -12px rgba(0, 0, 0, 0.7);
                border: 4px solid #1f2937;
            }
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulse-custom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        @keyframes moveBelt { 0% { top: -10%; } 100% { top: 100%; } }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(5%); } }
        @keyframes float { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-pulse-custom { animation: pulse-custom 2s infinite; }
        .animate-move-belt { animation: moveBelt 3s linear infinite; }
        .animate-bounce-slow { animation: bounce-slow 3s infinite ease-in-out; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .shake { animation: shake 0.4s ease-in-out; }
        .selected-pulse { animation: pulse-green 0.5s; }

        .custom-scrollbar::-webkit-scrollbar, .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar, .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Common UI Classes */
        .btn-primary { @apply bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2; }
        .font-fredoka { font-family: 'Fredoka One', 'Fredoka', cursive; }
        
        /* Game Specifics */
        .belt-marking { position: absolute; width: 100%; height: 2%; background: rgba(255, 255, 255, 0.1); }
        .control-btn:active, .control-btn.active { background-color: rgba(255, 255, 255, 0.4); transform: scale(0.98); }
        .memory-lane-btn { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; box-shadow: 0 8px 15px rgba(0, 198, 255, 0.3); }
        .memory-lane-btn:active { transform: scale(0.95) translateY(2px); box-shadow: 0 4px 8px rgba(0, 198, 255, 0.2); }
        .btn-green { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); box-shadow: 0 8px 15px rgba(67, 233, 123, 0.3); color: #064e3b; }
        .btn-red { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); box-shadow: 0 8px 15px rgba(255, 8, 68, 0.3); color: white; }

        /* Zoo Feeder Specifics */
        .feeder-belt { position: absolute; top: -5%; height: 78%; background: #64748b; border-left: 3px solid rgba(0,0,0,0.1); border-right: 3px solid rgba(0,0,0,0.1); transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.5s ease-in-out; border-radius: 0 0 20px 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .animal-happy .animal-emoji { animation: bounce 0.6s infinite alternate; }
        .animal-angry .animal-emoji { animation: shake 0.5s; }
        .food-item { position: absolute; width: 18%; aspect-ratio: 1/1; transform: translateX(-50%); display: flex; justify-content: center; align-items: center; font-size: clamp(2.5rem, 6vh, 4.5rem); z-index: 30; cursor: pointer; user-select: none; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); touch-action: manipulation; pointer-events: auto; transition: transform 0.1s, opacity 0.3s; }
        .food-item:active { transform: translateX(-50%) scale(0.9); }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- GLOBAL CONSTANTS ---
        const GAMES = {

            },

            },

        const Icon = ({ path, size = 24, className = "", viewBox = "0 0 24 24", fill = "none", stroke = "currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox={viewBox} fill={fill} stroke={stroke} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>

        );
        const Icons = {
            Play: <polygon points="5 3 19 12 5 21 5 3"></polygon>,
            Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></>,
            Check: <polyline points="20 6 9 17 4 12"></polyline>,
            Clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
            ChevronRight: <path d="m9 18 6-6-6-6" />,
            Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></>,
            ArrowLeft: <><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></>,
            X: <><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></>,
            Refresh: <><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" /><path d="M16 21h5v-5" /></>,
            Eye: <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>,
            ListChecks: <><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></>,
            ShoppingCart: <><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></>,
            Hand: <><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M10 4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M6 10V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M18 11c0 5-2 9-6 9s-6-4-6-9"/></>,
            GripVertical: <><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></>,
            Heart: <><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></>,
            CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
            XCircle: <><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></>,
            Star: <><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></>,
            Crown: <><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></>
        };

        // =========================================================================================
        // 🎮 [MODULE 1] MEMORY GAMES
        // =========================================================================================
        
        function MemoryGame({ level, onComplete, updateStats }) {
            const MEMORY_ITEMS = [
                { id: 'lion', name: 'สิงโต', icon: '🦁' }, { id: 'elephant', name: 'ช้าง', icon: '🐘' },
                { id: 'monkey', name: 'ลิง', icon: '🐵' }, { id: 'penguin', name: 'เพนกวิน', icon: '🐧' },
                { id: 'giraffe', name: 'ยีราฟ', icon: '🦒' }, { id: 'zebra', name: 'ม้าลาย', icon: '🦓' },
                { id: 'panda', name: 'แพนด้า', icon: '🐼' }, { id: 'tiger', name: 'เสือ', icon: '🐯' },
            ];
            const [step, setStep] = useState('memorize');
            const [target, setTarget] = useState(null);
            const [options, setOptions] = useState([]);
            const [timer, setTimer] = useState(5);
            const [startTime] = useState(Date.now());

            useEffect(() => {
                const item = MEMORY_ITEMS[Math.floor(Math.random() * MEMORY_ITEMS.length)];
                setTarget(item);
                const others = MEMORY_ITEMS.filter(i => i.id !== item.id).sort(() => 0.5 - Math.random()).slice(0, 3);
                setOptions([item, ...others].sort(() => 0.5 - Math.random()));
                
                const interval = setInterval(() => {
                    setTimer(t => {
                        if (t <= 1) {
                            clearInterval(interval);
                            setStep('recall');
                            return 0;
                        }
                        return t - 1;
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            const handleAnswer = (selected) => {
                if (selected.id === target.id) {
                    updateStats(100, (Date.now() - startTime) / 1000);
                    onComplete();
                } else {
                    alert('ผิดครับ ลองใหม่อีกครั้ง');
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full p-6 bg-orange-50 text-center">
                    <div className="bg-white p-8 rounded-3xl shadow-lg w-full max-w-sm">
                        {step === 'memorize' ? (
                            <div className="animate-pop-in">
                                <h2 className="text-2xl font-bold mb-4 text-orange-800">จำภาพนี้</h2>
                                <div className="text-8xl mb-6 animate-pulse">{target?.icon}</div>
                                <div className="text-4xl font-bold text-orange-600 mb-4">{timer}</div>
                            </div>
                        ) : (
                            <div className="animate-slide-up w-full">
                                <h2 className="text-xl font-bold mb-6 text-orange-800">ภาพเมื่อกี้คือ?</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {options.map(item => (
                                        <button key={item.id} onClick={() => handleAnswer(item)} className="bg-orange-100 hover:bg-orange-200 p-6 rounded-2xl text-4xl transition transform active:scale-95 shadow-sm border-2 border-orange-200">
                                            {item.icon}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function MemoryWalkingGame({ level, onComplete, onExit, updateStats }) {
            const canvasRef = useRef(null);
            const quizCanvasRef = useRef(null);
            const [gameState, setGameState] = useState('START');
            const [quizCount, setQuizCount] = useState(0);
            const [score, setScore] = useState(0);
            const [currentQuizItem, setCurrentQuizItem] = useState(null);
            
            const g = useRef({
                cw: 0, ch: 0, scrollX: 0, spawnTimer: 0, entities: [], seenItems: [],
                walkDuration: 25000, startTime: 0, groundY: 0, lastTimestamp: 0,
                buildings: [], clouds: [], totalQuestions: Math.max(1, level), reqId: null
            });

            const itemsPool = [
                { name: 'รถสีแดง', iconId: 'car', color: '#ef4444', type: 'vehicle', subType: 'car' },
                { name: 'ผลไม้สีเหลือง', iconId: 'banana', color: '#eab308', type: 'shop', subType: 'fruit' },
                { name: 'ดอกไม้สีชมพู', iconId: 'flower', color: '#f472b6', type: 'shop', subType: 'flower' },
                { name: 'จักรยานสีฟ้า', iconId: 'bike', color: '#3b82f6', type: 'vehicle', subType: 'bike' },
                { name: 'แมวสีส้ม', iconId: 'cat', color: '#f97316', type: 'prop', subType: 'wall' },
                { name: 'ร่มสีม่วง', iconId: 'umbrella', color: '#a855f7', type: 'person', subType: 'umbrella' },
                { name: 'ไอศกรีม', iconId: 'icecream', color: '#fbcfe8', type: 'prop', subType: 'cart' },
                { name: 'นกสีน้ำเงิน', iconId: 'bird', color: '#3b82f6', type: 'prop', subType: 'lamp' }
            ];

            useEffect(() => {
                g.current.buildings = [];
                let currentX = 0;
                while (currentX < 2000) {
                    let w = 120 + Math.random() * 150;
                    g.current.buildings.push({ x: currentX, width: w, height: 250 + Math.random() * 250, shade: 120 + Math.random() * 60, windows: Math.floor(Math.random() * 4) + 2 });
                    currentX += w + (Math.random() * 10);
                }
                g.current.clouds = [];
                for(let i=0; i<6; i++) g.current.clouds.push({ x: Math.random() * 1000, y: 40 + Math.random() * 80, size: 30 + Math.random() * 30, speed: 0.2 + Math.random() * 0.3 });

                const handleResize = () => {
                    const canvas = canvasRef.current;
                    if (canvas) {
                        const parent = canvas.parentElement;
                        canvas.width = parent.clientWidth;
                        canvas.height = parent.clientHeight;
                        g.current.cw = canvas.width;
                        g.current.ch = canvas.height;
                        g.current.groundY = canvas.height * 0.75;
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize();

                return () => { window.removeEventListener('resize', handleResize); cancelAnimationFrame(g.current.reqId); };
            }, []);

            const startGame = () => {
                setGameState('WALKING');
                g.current.startTime = Date.now();
                g.current.lastTimestamp = performance.now();
                g.current.entities = [];
                g.current.seenItems = [];
                g.current.spawnTimer = 0;
                g.current.scrollX = 0;
                g.current.reqId = requestAnimationFrame(animate);
            };

            const drawIcon = (ctx, id, x, y, scale = 1) => {
                ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
                ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 5;
                if (id === 'car') {
                    ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.roundRect(-35, -20, 70, 30, 5); ctx.fill();
                    ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(-20, 10, 10, 0, Math.PI*2); ctx.arc(20, 10, 10, 0, Math.PI*2); ctx.fill();
                } else if (id === 'banana') {
                    ctx.fillStyle = '#eab308'; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
                } else if (id === 'flower') {
                    ctx.fillStyle = '#f472b6'; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            };

            const drawHighlight = (ctx, x, y, data) => {
                let grad = ctx.createRadialGradient(x, y, 10, x, y, 40);
                grad.addColorStop(0, 'rgba(255,255,255,1)'); grad.addColorStop(1, data.color);
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, 38, 0, Math.PI * 2); ctx.fill();
                drawIcon(ctx, data.iconId, x, y, 1.2);
            };

            const animate = (timestamp) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { cw, ch, groundY, lastTimestamp, scrollX, buildings, clouds } = g.current;

                const deltaTime = timestamp - lastTimestamp;
                g.current.lastTimestamp = timestamp;
                const timeMultiplier = Math.min(deltaTime, 50) / 16.666;

                ctx.clearRect(0, 0, cw, ch);
                g.current.scrollX += 1.2 * timeMultiplier;

                let skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
                skyGrad.addColorStop(0, '#e5e7eb'); skyGrad.addColorStop(1, '#ffffff');
                ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, cw, ch);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                clouds.forEach(c => {
                    let cx = (c.x - (g.current.scrollX * c.speed)) % (cw + 200);
                    if (cx < -100) cx += cw + 200;
                    ctx.beginPath(); ctx.arc(cx, c.y, c.size, 0, Math.PI * 2); ctx.fill();
                });

                buildings.forEach(b => {
                    let bx = (b.x - (g.current.scrollX * 0.4)) % 2000;
                    if (bx < -200) bx += 2000;
                    ctx.fillStyle = `rgb(${b.shade},${b.shade},${b.shade})`; ctx.fillRect(bx, groundY - b.height, b.width, b.height);
                });

                ctx.fillStyle = '#9ca3af'; ctx.fillRect(0, groundY, cw, ch - groundY);
                ctx.strokeStyle = '#d1d5db'; ctx.lineWidth = 4; ctx.setLineDash([30, 40]);
                ctx.beginPath(); ctx.moveTo(0 - (scrollX % 70), groundY + 40); ctx.lineTo(cw, groundY + 40); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillStyle = '#e5e7eb'; ctx.fillRect(0, groundY, cw, 15);

                g.current.spawnTimer += Math.min(deltaTime, 50);
                if (g.current.spawnTimer > 1800) {
                    const isTarget = Math.random() > 0.6;
                    let itemData = null;
                    if (isTarget) {
                        itemData = itemsPool[Math.floor(Math.random() * itemsPool.length)];
                        g.current.seenItems.push(itemData);
                    }
                    g.current.entities.push({ x: cw + 50, y: groundY - 30, speed: 2, data: itemData, layer: 'front', isTarget: isTarget });
                    g.current.spawnTimer = 0;
                }

                for (let i = g.current.entities.length - 1; i >= 0; i--) {
                    const e = g.current.entities[i];
                    e.x -= e.speed * timeMultiplier;
                    if (e.x < -300) g.current.entities.splice(i, 1);
                    else if (e.isTarget) drawHighlight(ctx, e.x, e.y - 20, e.data);
                }

                ctx.fillStyle = '#333';
                ctx.fillRect(100, groundY - 60, 20, 60);
                ctx.beginPath(); ctx.arc(110, groundY - 70, 15, 0, Math.PI*2); ctx.fill();

                const elapsed = Date.now() - g.current.startTime;
                const progress = Math.min(elapsed / g.current.walkDuration, 1);
                ctx.fillStyle = '#e5e7eb'; ctx.fillRect(20, 30, cw - 40, 10);
                ctx.fillStyle = '#10b981'; ctx.fillRect(20, 30, (cw - 40) * progress, 10);

                if (elapsed > g.current.walkDuration) { setGameState('QUIZ'); startQuiz(); return; }
                g.current.reqId = requestAnimationFrame(animate);
            };

            const startQuiz = () => {
                setQuizCount(0);
                nextQuestion();
            };

            const nextQuestion = () => {
                if (quizCount >= g.current.totalQuestions) { setGameState('RESULT'); return; }
                const isReal = Math.random() > 0.5;
                if (isReal && g.current.seenItems.length > 0) {
                    setCurrentQuizItem({ item: g.current.seenItems[Math.floor(Math.random() * g.current.seenItems.length)], wasSeen: true });
                } else {
                    const unseen = itemsPool.filter(i => !g.current.seenItems.some(s => s.name === i.name));
                    setCurrentQuizItem({ item: unseen[Math.floor(Math.random() * unseen.length)], wasSeen: false });
                }
                setQuizCount(prev => prev + 1);
            };

            useEffect(() => {
                if (gameState === 'QUIZ' && currentQuizItem && quizCanvasRef.current) {
                    const ctx = quizCanvasRef.current.getContext('2d');
                    ctx.clearRect(0, 0, 160, 160);
                    drawIcon(ctx, currentQuizItem.item.iconId, 80, 80, 2.5);
                }
            }, [gameState, currentQuizItem]);

            const checkAnswer = (userSaidSeen) => {
                if (userSaidSeen === currentQuizItem.wasSeen) setScore(prev => prev + 1);
                setTimeout(() => nextQuestion(), 500);
            };

            return (
                <div className="w-full h-full relative bg-gray-100 font-sarabun flex flex-col items-center justify-center overflow-hidden">
                    {gameState === 'START' && (
                        <div className="absolute inset-0 z-20 bg-white/90 flex flex-col items-center justify-center p-6 text-center">
                            <h1 className="text-5xl font-bold mb-6 text-gray-800 drop-shadow-sm">บันทึกทางเดิน</h1>
                            <div className="bg-white p-6 rounded-2xl shadow-md mb-8 text-lg">
                                <div className="text-blue-600 font-bold mb-2 text-2xl">⭐ ระดับความยากที่ {level} ⭐</div>
                                มองดูสิ่งของทางขวามือ<br /><strong>จำสิ่งที่ <span className="text-blue-500">"มีสีสัน"</span> ให้ดี</strong><br />
                                แล้วตอบคำถาม <span className="text-red-500 font-bold">{g.current.totalQuestions}</span> ข้อ
                            </div>
                            <button onClick={startGame} className="memory-lane-btn text-white px-10 py-4 rounded-full text-2xl font-bold transition transform active:scale-95">เริ่มเดินเล่น</button>
                        </div>
                    )}
                    <canvas ref={canvasRef} className="block w-full h-full" />
                    {gameState === 'QUIZ' && (
                        <div className="absolute inset-0 z-30 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center p-4">
                            <h2 className="text-3xl font-bold mb-4 text-gray-800 text-center">เมื่อสักครู่...<br/>คุณเห็นสิ่งนี้หรือไม่?</h2>
                            <canvas ref={quizCanvasRef} width="160" height="160" className="bg-white rounded-full border-4 border-blue-400 shadow-xl mb-8"></canvas>
                            <div className="flex flex-col w-full max-w-xs gap-4">
                                <button onClick={() => checkAnswer(true)} className="btn-green text-white py-4 rounded-full text-2xl font-bold shadow-lg transition transform active:scale-95">✓ เห็น</button>
                                <button onClick={() => checkAnswer(false)} className="btn-red text-white py-4 rounded-full text-2xl font-bold shadow-lg transition transform active:scale-95">✗ ไม่เห็น</button>
                            </div>
                        </div>
                    )}
                    {gameState === 'RESULT' && (
                        <div className="absolute inset-0 z-30 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center p-4">
                            <h2 className="text-5xl font-bold mb-4 text-gray-800">เก่งมาก!</h2>
                            <div className="bg-white p-8 rounded-3xl shadow-xl mb-8 text-center border-2 border-gray-100">
                                <p className="text-3xl font-bold text-gray-700 mb-2">คะแนนของคุณ</p>
                                <p className="text-6xl font-bold text-blue-500">{score} / {g.current.totalQuestions}</p>
                            </div>
                            <button onClick={() => { updateStats(score * 100, g.current.walkDuration / 1000); onComplete(); }} className="memory-lane-btn text-white px-10 py-4 rounded-full text-2xl font-bold transition transform active:scale-95">เสร็จสิ้น</button>
                        </div>
                    )}
                </div>
            );
        }

        function MemoryLotteryGame({ level, onComplete, updateStats }) {
            const ITEM_TYPES = [
                { icon: "📦", name: "กล่อง" }, { icon: "🎟️", name: "ตั๋ว" }, { icon: "📀", name: "แผ่นเพลง" },
                { icon: "📱", name: "มือถือ" }, { icon: "⌚", name: "นาฬิกา" }, { icon: "🧢", name: "หมวก" },
                { icon: "🎒", name: "กระเป๋า" }, { icon: "👟", name: "รองเท้า" }, { icon: "👓", name: "แว่นตา" },
                { icon: "📷", name: "กล้อง" }, { icon: "🧸", name: "ตุ๊กตา" }, { icon: "💊", name: "ยาดม" },
                { icon: "☂️", name: "ร่ม" }, { icon: "🧵", name: "ไหมพรม" }, { icon: "🪴", name: "ต้นไม้" },
            ];

            const [gameState, setGameState] = useState('intro');
            const [targetCodes, setTargetCodes] = useState([]);
            const [revealTokens, setRevealTokens] = useState([]);
            const [shopItems, setShopItems] = useState([]);
            const [selectedItems, setSelectedItems] = useState([]);
            const [isMixMode, setIsMixMode] = useState(false);
            const [timeElapsed, setTimeElapsed] = useState(0);
            const [revealProgress, setRevealProgress] = useState(100);
            const [memoCountdown, setMemoCountdown] = useState(3);
            const [startTime, setStartTime] = useState(0);

            const difficulty = level <= 5 ? 'easy' : level <= 10 ? 'medium' : 'hard';

            const generateRandomCode = (len) => Array.from({length: len}, () => Math.floor(Math.random() * 10)).join('');

            const startGame = () => {
                let itemsToBuyCount = 0;
                let codeLengthMin = 1, codeLengthMax = 1;
                let mixMode = false;

                if (difficulty === 'easy') { itemsToBuyCount = Math.floor(Math.random() * 3) + 3; codeLengthMin = 1; codeLengthMax = 2; }
                else if (difficulty === 'medium') { itemsToBuyCount = Math.floor(Math.random() * 4) + 2; codeLengthMin = 1; codeLengthMax = 3; }
                else { itemsToBuyCount = 3; codeLengthMin = 2; codeLengthMax = 2; mixMode = true; }

                const tCodes = [], rTokens = [];
                for (let i = 0; i < itemsToBuyCount; i++) {
                    let newCode = "";
                    while (!newCode || tCodes.includes(newCode)) newCode = generateRandomCode(mixMode ? 2 : Math.floor(Math.random() * (codeLengthMax - codeLengthMin + 1)) + codeLengthMin);
                    tCodes.push(newCode);
                    if (mixMode) { rTokens.push(newCode[0]); rTokens.push(newCode[1]); }
                    else { rTokens.push(newCode); }
                }

                // FIX: Support up to 18 items max to avoid undefined errors (max length depends on difficulty but 9 is not enough for 15 distractors)
                const gridTotalSlots = 18; 
                const sItems = new Array(gridTotalSlots).fill(null);
                const availableSlots = Array.from({length: gridTotalSlots}, (_, i) => i).sort(() => 0.5 - Math.random());
                const shuffledTypes = [...ITEM_TYPES].sort(() => 0.5 - Math.random());

                for (let i = 0; i < itemsToBuyCount; i++) {
                    const slot = availableSlots.pop();
                    if(slot !== undefined) sItems[slot] = { id: slot, ...shuffledTypes[i % shuffledTypes.length], code: tCodes[i], isTarget: true };
                }
                
                // Keep some empty or fill with distractors up to a reasonable amount
                const distractorCount = Math.min(availableSlots.length, 9); // Limit total shown items to prevent clutter
                for (let i = 0; i < distractorCount; i++) {
                    const slot = availableSlots.pop();
                    if(slot !== undefined) {
                        let distractorCode = "";
                        do { distractorCode = generateRandomCode(mixMode ? 2 : Math.floor(Math.random() * (codeLengthMax - codeLengthMin + 1)) + codeLengthMin); } while (tCodes.includes(distractorCode));
                        sItems[slot] = { id: slot, ...shuffledTypes[(itemsToBuyCount + i) % shuffledTypes.length], code: distractorCode, isTarget: false };
                    }
                }

                setTargetCodes(tCodes); setRevealTokens(rTokens); setShopItems(sItems.filter(Boolean)); setIsMixMode(mixMode);
                setSelectedItems([]); setTimeElapsed(0); setGameState('reveal'); setStartTime(Date.now());
            };

            useEffect(() => {
                if (gameState === 'reveal') {
                    const revealDuration = 4000 + (revealTokens.length * 1500);
                    const st = Date.now();
                    const interval = setInterval(() => {
                        const elapsed = Date.now() - st;
                        const remaining = Math.max(0, 100 - (elapsed / revealDuration) * 100);
                        setRevealProgress(remaining);
                        if (remaining <= 0) { clearInterval(interval); setGameState('memorize'); setMemoCountdown(3); }
                    }, 50);
                    return () => clearInterval(interval);
                }
            }, [gameState, revealTokens]);

            useEffect(() => {
                if (gameState === 'memorize') {
                    const timer = setInterval(() => {
                        setMemoCountdown((prev) => {
                            if (prev <= 1) { clearInterval(timer); setTimeout(() => setGameState('shop'), 500); return 0; }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(timer);
                }
            }, [gameState]);

            useEffect(() => {
                if (gameState === 'shop') {
                    const timerInterval = setInterval(() => setTimeElapsed(prev => prev + 1), 1000);
                    return () => clearInterval(timerInterval);
                }
            }, [gameState]);

            const getGridPositions = (count) => {
                const positions = [];
                const cells = [];
                // Fixed grid size issue to accommodate up to 18 tokens without undefined errors
                for (let r = 0; r < 6; r++) for (let c = 0; c < 3; c++) cells.push({ r, c });
                cells.sort(() => 0.5 - Math.random());
                for (let i = 0; i < count; i++) {
                    const cell = cells[i] || { r: 0, c: 0 }; // Fallback
                    positions.push({
                        top: `${15 + (cell.r * 12) + (Math.random() * 5)}%`, 
                        left: `${5 + (cell.c * 30) + (Math.random() * 5)}%`,
                        bgColor: ['bg-red-100', 'bg-blue-100', 'bg-green-100', 'bg-yellow-100'][Math.floor(Math.random()*4)],
                        borderColor: ['border-red-300', 'border-blue-300', 'border-green-300', 'border-yellow-300'][Math.floor(Math.random()*4)],
                    });
                }
                return positions;
            };
            const bubblePositions = useRef(getGridPositions(18)).current;

            const toggleSelect = (itemId) => {
                if (selectedItems.includes(itemId)) setSelectedItems(selectedItems.filter(id => id !== itemId));
                else if (selectedItems.length < targetCodes.length) setSelectedItems([...selectedItems, itemId]);
            };

            const confirmSelection = () => {
                const selectedShopItems = shopItems.filter(item => selectedItems.includes(item.id));
                const selectedCodes = selectedShopItems.map(item => item.code);
                const isCorrectLength = selectedItems.length === targetCodes.length;
                const isAllCorrect = selectedCodes.every(code => targetCodes.includes(code));

                if (isCorrectLength && isAllCorrect) {
                    let baseScore = difficulty === 'easy' ? 100 : difficulty === 'medium' ? 200 : 300;
                    let timeBonus = Math.max(0, (60 - timeElapsed) * 2);
                    updateStats(baseScore + timeBonus, (Date.now() - startTime) / 1000);
                    onComplete();
                } else {
                    alert("ยังไม่ถูกต้อง! ลองดูดีๆ นะครับ");
                    setSelectedItems([]); 
                }
            };

            return (
                <div className="w-full h-full relative bg-amber-50 font-kanit flex flex-col overflow-hidden">
                    {gameState === 'intro' && (
                        <div className="flex flex-col items-center justify-center h-full p-6 text-center animate-fade-in">
                            <div className="bg-white p-6 rounded-3xl shadow-lg border border-orange-100 mb-8 w-full max-w-xs">
                                <h2 className="text-2xl font-bold text-orange-600 mb-4 flex items-center justify-center gap-2"><Icon path={Icons.ListChecks} size={24}/> กติกาการเล่น</h2>
                                <ul className="space-y-4 text-left text-gray-700 text-lg">
                                    <li className="flex items-start gap-3"><div className="bg-orange-100 p-2 rounded-lg mt-1"><Icon path={Icons.Eye} size={20} className="text-orange-600"/></div><span><b>ดูตัวเลข</b> ที่ลอยอยู่ให้ทัน</span></li>
                                    <li className="flex items-start gap-3"><div className="bg-orange-100 p-2 rounded-lg mt-1"><Icon path={Icons.Check} size={20} className="text-orange-600"/></div><span><b>จำตัวเลข</b> ให้ได้ทั้งหมด</span></li>
                                </ul>
                                {isMixMode && <div className="mt-4 bg-red-50 p-3 rounded-xl border border-red-100 text-red-800 text-sm"><b>🔥 ระดับยาก:</b> นำเลขโดดมาจับคู่รหัสให้ตรง</div>}
                            </div>
                            <button onClick={startGame} className="w-full max-w-xs bg-orange-500 text-white text-2xl font-bold py-4 rounded-full shadow-lg active:scale-95 transition flex justify-center items-center gap-2"><Icon path={Icons.Play} size={24}/> เริ่มเล่นเลย</button>
                        </div>
                    )}

                    {gameState === 'reveal' && (
                        <div className="flex flex-col h-full bg-slate-800 relative">
                            <div className="h-2 w-full bg-slate-700"><div className="h-full bg-orange-400 transition-all duration-75 ease-linear" style={{ width: `${revealProgress}%` }} /></div>
                            <div className="px-6 py-4 text-center z-10 bg-slate-800/80"><h2 className="text-3xl font-bold text-white mb-2">จำตัวเลขเหล่านี้</h2><p className="text-slate-300">มีทั้งหมด {revealTokens.length} ตัว</p></div>
                            <div className="flex-1 relative w-full mt-4">
                                {revealTokens.map((code, index) => (
                                    <div key={index} className={`absolute ${bubblePositions[index].bgColor} ${bubblePositions[index].borderColor} text-slate-900 font-mono font-black text-5xl w-24 h-24 flex items-center justify-center rounded-full shadow-2xl border-4 animate-float`} style={{ top: bubblePositions[index].top, left: bubblePositions[index].left, animationDelay: `${index * 0.2}s` }}>
                                        {code}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {gameState === 'memorize' && (
                        <div className="flex flex-col items-center justify-center h-full bg-orange-600 text-white animate-fade-in relative">
                            <div className="text-[10rem] font-black mb-4 leading-none">{memoCountdown > 0 ? memoCountdown : "ไป!"}</div>
                            <h2 className="text-3xl font-bold opacity-90">เตรียมตัวซื้อของ...</h2>
                        </div>
                    )}

                    {gameState === 'shop' && (
                        <div className="flex flex-col h-full bg-amber-50">
                            <div className="bg-white px-4 py-4 shadow-sm z-10 border-b border-orange-100 flex justify-between items-center">
                                <div className="flex items-center gap-1 font-mono text-xl font-bold bg-orange-50 px-3 py-1 rounded-lg text-orange-600"><Icon path={Icons.Clock} size={20} /> {Math.floor(timeElapsed / 60)}:{(timeElapsed % 60).toString().padStart(2, '0')}</div>
                                <span className="text-lg font-bold text-gray-600">ตะกร้า <span className="text-orange-600 text-2xl">{selectedItems.length}</span> / {targetCodes.length}</span>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4">
                                <div className="grid grid-cols-3 gap-3 pb-24">
                                    {shopItems.map((item) => {
                                        const isSelected = selectedItems.includes(item.id);
                                        return (
                                            <button key={item.id} onClick={() => toggleSelect(item.id)} className={`relative aspect-[3/4] p-2 rounded-2xl flex flex-col items-center justify-center transition-all duration-200 border-4 shadow-sm ${isSelected ? 'bg-orange-100 border-orange-500 transform scale-95 shadow-inner' : 'bg-white border-white hover:border-orange-200 shadow-md'}`}>
                                                <span className="text-5xl mb-2 drop-shadow-md">{item.icon}</span>
                                                <div className={`px-3 py-1 rounded-lg text-xl font-mono font-black tracking-tight border-2 ${isSelected ? 'bg-orange-500 text-white border-orange-500' : 'bg-gray-100 text-gray-700 border-gray-200'}`}>{item.code}</div>
                                                {isSelected && <div className="absolute -top-2 -right-2 bg-green-500 rounded-full p-1 shadow-lg border-2 border-white"><Icon path={Icons.Check} size={16} className="text-white" /></div>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="absolute bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur border-t border-orange-100">
                                <button onClick={confirmSelection} disabled={selectedItems.length === 0} className={`w-full py-4 rounded-2xl text-2xl font-bold text-white shadow-xl transition-all ${selectedItems.length !== targetCodes.length ? 'bg-gray-300 text-gray-500' : 'bg-green-600 hover:bg-green-700 active:scale-95 animate-pulse'}`}>
                                    {selectedItems.length === targetCodes.length ? 'ยืนยันคำตอบ' : `หยิบให้ครบ (${selectedItems.length}/${targetCodes.length})`}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // -----------------------------------------------------------------------------------------
        // [MODULE 2] VISUOSPATIAL GAMES
        // -----------------------------------------------------------------------------------------

        function VisuospatialGame({ level, onComplete, updateStats, mode }) {
            const [grid, setGrid] = useState([]);
            const [size] = useState(mode === 'hard' ? 6 : 4);
            const startTime = useRef(Date.now());

            useEffect(() => {
                const total = size * size;
                const newGrid = Array(total).fill(null).map((_, i) => ({ 
                    id: i, 
                    row: Math.floor(i/size), 
                    col: i%size,
                    filled: false, 
                    locked: false 
                }));
                
                const limit = size/2;
                const dotCount = 3 + (level > 5 ? 2 : 0);
                let placed = 0;
                
                while(placed < dotCount) {
                    const r = Math.floor(Math.random() * size);
                    const c = Math.floor(Math.random() * limit);
                    const idx = r * size + c;
                    if(!newGrid[idx].locked) {
                        newGrid[idx].locked = true;
                        placed++;
                    }
                }
                setGrid(newGrid);
            }, [level, mode, size]);

            const handleCellClick = (id) => {
                setGrid(prev => prev.map(c => {
                    if (c.locked) return c;
                    return c.id === id ? { ...c, filled: !c.filled } : c;
                }));
            };

            const checkWin = () => {
                let correct = true;
                grid.forEach(cell => {
                    if (cell.col < size/2) return;
                    const mirrorCol = (size - 1) - cell.col;
                    const mirrorIdx = cell.row * size + mirrorCol;
                    const mirrorCell = grid[mirrorIdx];
                    if (mirrorCell.locked !== cell.filled) correct = false;
                });

                if (correct) {
                    updateStats(100 * level, (Date.now() - startTime.current) / 1000);
                    onComplete();
                } else {
                    alert('ยังไม่ถูกต้องครับ ลองตรวจสอบการสะท้อนอีกครั้ง');
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full bg-blue-50 p-4">
                    <h2 className="text-2xl font-bold text-blue-800 mb-6">สะท้อนจุด (แนวตั้ง)</h2>
                    <div className="relative bg-white p-4 rounded-3xl shadow-xl border-4 border-blue-100">
                        <div className="absolute top-4 bottom-4 left-1/2 w-1 bg-blue-300 transform -translate-x-1/2 z-10 border-l-2 border-dashed border-blue-500 opacity-50"></div>
                        <div className="grid gap-2" style={{ gridTemplateColumns: `repeat(${size}, 1fr)`, width: 'min(80vw, 300px)', height: 'min(80vw, 300px)' }}>
                            {grid.map(c => (
                                <button key={c.id} 
                                    onClick={() => handleCellClick(c.id)}
                                    disabled={c.locked}
                                    className={`rounded-lg transition-all duration-200 ${
                                        c.locked ? 'bg-slate-400' : 
                                        c.filled ? 'bg-blue-500 shadow-md transform scale-95' : 
                                        'bg-slate-100 hover:bg-slate-200'
                                    }`}
                                >
                                </button>
                            ))}
                        </div>
                    </div>
                    <button onClick={checkWin} className="btn-primary mt-8 w-full max-w-xs shadow-xl">ตรวจสอบคำตอบ</button>
                </div>
            );
        }

        function VisuospatialOrganizeGame({ level, onComplete, onExit, updateStats }) {
            const canvasRef = useRef(null);
            const [modeText, setModeText] = useState("");
            
            const stateRef = useRef({
                level: level, score: 0, fixedItems: [], playItems: [], dragItem: null, isDragging: false,
                originalGridPos: { r: 0, c: 0 }, currentSymmetryMode: 'left_to_right', rows: 4, cols: 4,
                gridX: 0, gridY: 0, gridWidth: 0, gridHeight: 0, cellSize: 0, startTime: Date.now()
            });

            const colors = ['#ef4444', '#3b82f6', '#eab308', '#a855f7', '#10b981']; 
            const shapes = ['vase', 'photo', 'bottle', 'doll'];

            useEffect(() => {
                initLevel();
                const handleResize = () => { resize(); draw(); };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const resize = () => {
                const canvas = canvasRef.current;
                if(!canvas) return;
                const container = canvas.parentElement;
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                
                const s = stateRef.current;
                const margin = canvas.width * 0.1;
                s.gridWidth = canvas.width - (margin * 2);
                
                const maxHeight = canvas.height * 0.60;
                s.cellSize = s.gridWidth / s.cols;
                s.gridHeight = s.cellSize * s.rows;
                
                if (s.gridHeight > maxHeight) {
                    s.gridHeight = maxHeight;
                    s.cellSize = s.gridHeight / s.rows;
                    s.gridWidth = s.cellSize * s.cols;
                }
                
                s.gridX = (canvas.width - s.gridWidth) / 2;
                s.gridY = (canvas.height - s.gridHeight) / 2 + (canvas.height * 0.05);

                s.playItems.forEach(item => {
                    if (item.r !== -1) {
                        const pos = getCellCenter(item.r, item.c);
                        item.x = pos.x; item.y = pos.y;
                    }
                });
            };

            const initLevel = () => {
                const s = stateRef.current;
                s.fixedItems = []; s.playItems = [];
                s.rows = 4; s.cols = 4; s.currentSymmetryMode = 'left_to_right'; 
                updateMissionUI();
                resize();

                let itemCount = 3;
                let fixedZone = { minR: 0, maxR: s.rows-1, minC: 0, maxC: (s.cols/2)-1 };
                let playZone = { minR: 0, maxR: s.rows-1, minC: s.cols/2, maxC: s.cols-1 };

                let usedPositions = new Set();
                for(let i=0; i<itemCount; i++) {
                    let r, c, key;
                    do {
                        r = Math.floor(Math.random() * (fixedZone.maxR - fixedZone.minR + 1)) + fixedZone.minR;
                        c = Math.floor(Math.random() * (fixedZone.maxC - fixedZone.minC + 1)) + fixedZone.minC;
                        key = `${r},${c}`;
                    } while(usedPositions.has(key));
                    usedPositions.add(key);

                    const shape = shapes[Math.floor(Math.random() * shapes.length)];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    s.fixedItems.push({ r, c, shape, color, id: i });
                    s.playItems.push({ r: -1, c: -1, shape, color, id: i, x: 0, y: 0 });
                }

                let playUsedPos = new Set();
                s.playItems.forEach(item => {
                    let r, c, key;
                    do {
                        r = Math.floor(Math.random() * (playZone.maxR - playZone.minR + 1)) + playZone.minR;
                        c = Math.floor(Math.random() * (playZone.maxC - playZone.minC + 1)) + playZone.minC;
                        key = `${r},${c}`;
                        if(checkItemWin(s.fixedItems.find(f => f.id === item.id), r, c, s)) {
                            if(Math.random() > 0.2) continue; 
                        }
                    } while(playUsedPos.has(key));
                    playUsedPos.add(key);
                    item.r = r; item.c = c;
                    const pos = getCellCenter(r, c);
                    item.x = pos.x; item.y = pos.y;
                });
                draw();
            };

            const updateMissionUI = () => { setModeText("➡️ สะท้อนซ้ายไปขวา"); };

            const getCellCenter = (r, c) => {
                const s = stateRef.current;
                return { x: s.gridX + (c * s.cellSize) + (s.cellSize / 2), y: s.gridY + (r * s.cellSize) + (s.cellSize / 2) };
            };

            const checkItemWin = (fixedItem, r, c, s) => {
                const targetC = (s.cols - 1) - fixedItem.c;
                return (r === fixedItem.r && c === targetC);
            };

            const checkWinCondition = () => {
                const s = stateRef.current;
                let correctCount = 0;
                for (let fItem of s.fixedItems) {
                    const pItem = s.playItems.find(p => p.id === fItem.id);
                    if (pItem && checkItemWin(fItem, pItem.r, pItem.c, s)) correctCount++;
                }
                if (correctCount === s.fixedItems.length) {
                    const timeSpent = (Date.now() - s.startTime) / 1000;
                    updateStats(100, timeSpent);
                    onComplete();
                }
            };

            const draw = () => {
                const canvas = canvasRef.current;
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                const s = stateRef.current;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#78350f'; ctx.fillRect(s.gridX - 5, s.gridY - 5, s.gridWidth + 10, s.gridHeight + 10);
                ctx.fillStyle = '#451a03'; ctx.fillRect(s.gridX, s.gridY, s.gridWidth, s.gridHeight);

                ctx.strokeStyle = '#92400e'; ctx.lineWidth = 2;
                for(let i=1; i<s.rows; i++) {
                    const y = s.gridY + (i * s.cellSize);
                    ctx.beginPath(); ctx.moveTo(s.gridX, y); ctx.lineTo(s.gridX + s.gridWidth, y); ctx.stroke();
                }
                for(let i=1; i<s.cols; i++) {
                    const x = s.gridX + (i * s.cellSize);
                    ctx.beginPath(); ctx.moveTo(x, s.gridY); ctx.lineTo(x, s.gridY + s.gridHeight); ctx.stroke();
                }

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 4; ctx.setLineDash([10, 5]);
                ctx.beginPath(); const mx = s.gridX + (s.gridWidth / 2);
                ctx.moveTo(mx, s.gridY); ctx.lineTo(mx, s.gridY + s.gridHeight); ctx.stroke(); ctx.setLineDash([]);

                s.fixedItems.forEach(item => drawItem(ctx, item, true));
                s.playItems.filter(i => i !== s.dragItem).forEach(item => drawItem(ctx, item, false));
                if (s.dragItem) drawItem(ctx, s.dragItem, false);
            };

            const drawItem = (ctx, item, isFixed) => {
                const s = stateRef.current;
                let cx, cy;
                if (isFixed) {
                    const pos = getCellCenter(item.r, item.c);
                    cx = pos.x; cy = pos.y;
                } else {
                    cx = item.x; cy = item.y;
                }
                const size = s.cellSize * 0.7;
                ctx.save();
                ctx.translate(cx, cy);
                if (isFixed) {
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI*2); ctx.fill();
                }
                if (item === s.dragItem) { ctx.scale(1.2, 1.2); ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 15; }
                ctx.fillStyle = item.color;
                ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI*2); ctx.fill(); 
                if (isFixed) { ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🔒', 0, 0); }
                ctx.restore();
            };

            const getPointerPos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const handleStart = (e) => {
                e.preventDefault();
                const pos = getPointerPos(e);
                const s = stateRef.current;
                for (let item of s.playItems) {
                    const dx = pos.x - item.x;
                    const dy = pos.y - item.y;
                    if (Math.sqrt(dx*dx + dy*dy) < s.cellSize/2) {
                        s.isDragging = true; s.dragItem = item;
                        s.originalGridPos = { r: item.r, c: item.c };
                        draw(); return;
                    }
                }
            };

            const handleMove = (e) => {
                const s = stateRef.current;
                if (s.isDragging && s.dragItem) {
                    e.preventDefault();
                    const pos = getPointerPos(e);
                    s.dragItem.x = pos.x; s.dragItem.y = pos.y;
                    draw();
                }
            };

            const handleEnd = (e) => {
                const s = stateRef.current;
                if (!s.isDragging || !s.dragItem) return;
                e.preventDefault();
                let dropped = false;
                if (s.dragItem.x > s.gridX && s.dragItem.x < s.gridX + s.gridWidth && s.dragItem.y > s.gridY && s.dragItem.y < s.gridY + s.gridHeight) {
                    const c = Math.floor((s.dragItem.x - s.gridX) / s.cellSize);
                    const r = Math.floor((s.dragItem.y - s.gridY) / s.cellSize);
                    if (c >= s.cols/2) {
                        const occupier = s.playItems.find(i => i !== s.dragItem && i.r === r && i.c === c);
                        if (occupier) {
                            occupier.r = s.originalGridPos.r; occupier.c = s.originalGridPos.c;
                            const oldPos = getCellCenter(occupier.r, occupier.c);
                            occupier.x = oldPos.x; occupier.y = oldPos.y;
                        }
                        s.dragItem.r = r; s.dragItem.c = c;
                        dropped = true;
                    }
                }
                if (!dropped) { s.dragItem.r = s.originalGridPos.r; s.dragItem.c = s.originalGridPos.c; }
                const snapPos = getCellCenter(s.dragItem.r, s.dragItem.c);
                s.dragItem.x = snapPos.x; s.dragItem.y = snapPos.y;
                s.isDragging = false; s.dragItem = null;
                draw();
                checkWinCondition();
            };

            return (
                <div className="w-full h-full flex flex-col bg-slate-800 text-white relative">
                    <div className="absolute top-4 left-4 z-10 bg-slate-900/50 px-3 py-1 rounded-full text-sm border border-slate-700">{modeText}</div>
                    <canvas ref={canvasRef} className="touch-none block w-full h-full" onMouseDown={handleStart} onMouseMove={handleMove} onMouseUp={handleEnd} onMouseLeave={handleEnd} onTouchStart={handleStart} onTouchMove={handleMove} onTouchEnd={handleEnd} />
                </div>
            );
        }

        function VisuospatialArrowGame({ level, onComplete, updateStats }) {
            const canvasRef = useRef(null);
            const [gameState, setGameState] = useState('START');
            const [score, setScore] = useState(0);
            const [ammoLeft, setAmmoLeft] = useState(0);
            const g = useRef({
                width: 0, height: 0, currentLevel: Math.max(1, level),
                targets: [], particles: [], projectile: null, shelvesY: [],
                isDragging: false, dragStart: {x:0, y:0}, dragCurrent: {x:0, y:0},
                MAX_DRAG_DIST: 180, FORCE_MULTIPLIER: 0.24, GRAVITY: 0.5,
                startTime: 0, reqId: null
            });

            useEffect(() => {
                const handleResize = () => {
                    const canvas = canvasRef.current;
                    if (canvas) {
                        const parent = canvas.parentElement;
                        canvas.width = parent.clientWidth;
                        canvas.height = parent.clientHeight;
                        g.current.width = canvas.width;
                        g.current.height = canvas.height;
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => { window.removeEventListener('resize', handleResize); cancelAnimationFrame(g.current.reqId); };
            }, []);

            const startGame = () => {
                setScore(0);
                g.current.currentLevel = Math.max(1, level);
                g.current.startTime = Date.now();
                setGameState('PLAYING');
                startLevel();
                g.current.reqId = requestAnimationFrame(loop);
            };

            const startLevel = () => {
                const gc = g.current;
                gc.shelvesY = [0.15, 0.35, 0.55]; 
                gc.targets = [];
                let numTargets = 2 + gc.currentLevel;
                if (numTargets > 10) numTargets = 10;
                setAmmoLeft(numTargets + 3);
                
                let speed = 1.0 * (1 + (gc.currentLevel - 1) * 0.15);

                for(let i=0; i<numTargets; i++) {
                    const shelfIndex = i % gc.shelvesY.length;
                    const yPct = gc.shelvesY[shelfIndex];
                    const xPos = Math.random() * (gc.width - 80) + 40;
                    const yPos = (gc.height * yPct) - 35;
                    gc.targets.push({
                        x: xPos, y: yPos, vx: (Math.random() > 0.5 ? 1 : -1) * speed,
                        radius: 26, color: `hsl(${Math.random() * 360}, 80%, 60%)`
                    });
                }
            };

            const loop = () => {
                if (gameState !== 'PLAYING') return;
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const gc = g.current;
                const pPos = { x: gc.width / 2, y: gc.height * 0.85 };

                ctx.clearRect(0, 0, gc.width, gc.height);
                
                ctx.fillStyle = '#8e44ad';
                gc.shelvesY.forEach(pct => {
                    const y = (gc.height * pct) + 10;
                    ctx.fillRect(0, y, gc.width, 12);
                    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, y + 8, gc.width, 4);
                    ctx.fillStyle = '#8e44ad';
                });

                if (gc.isDragging) {
                    let dx = gc.dragCurrent.x - gc.dragStart.x;
                    let dy = gc.dragCurrent.y - gc.dragStart.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist > gc.MAX_DRAG_DIST) { let r = gc.MAX_DRAG_DIST/dist; dx*=r; dy*=r; }

                    ctx.beginPath(); ctx.moveTo(pPos.x, pPos.y); ctx.lineTo(pPos.x + dx, pPos.y + dy);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();

                    let vx = (gc.dragStart.x - gc.dragCurrent.x) * gc.FORCE_MULTIPLIER;
                    let vy = (gc.dragStart.y - gc.dragCurrent.y) * gc.FORCE_MULTIPLIER;
                    if(dist > gc.MAX_DRAG_DIST) {
                        let r = gc.MAX_DRAG_DIST / Math.sqrt(Math.pow(gc.dragStart.x - gc.dragCurrent.x, 2) + Math.pow(gc.dragStart.y - gc.dragCurrent.y, 2));
                        vx = ((gc.dragStart.x - gc.dragCurrent.x) * r) * gc.FORCE_MULTIPLIER;
                        vy = ((gc.dragStart.y - gc.dragCurrent.y) * r) * gc.FORCE_MULTIPLIER;
                    }
                    if(vy > 0) vy = -vy*0.5;

                    let sx = pPos.x, sy = pPos.y;
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    for(let k=0; k<12; k++) {
                        sx += vx; sy += vy; vy += gc.GRAVITY;
                        ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI*2); ctx.fill();
                    }
                } else if (!gc.projectile) {
                    ctx.save(); ctx.translate(pPos.x, pPos.y); ctx.rotate(-Math.PI/2);
                    ctx.fillStyle = '#bdc3c7'; ctx.fillRect(-5, -20, 10, 40); ctx.restore();
                }

                gc.targets.forEach(t => {
                    t.x += t.vx;
                    if (t.x < 30 || t.x > gc.width - 30) {
                        t.vx *= -1;
                        if (t.x < 30) t.x = 30;
                        if (t.x > gc.width - 30) t.x = gc.width - 30;
                    }
                    ctx.beginPath(); ctx.moveTo(t.x, t.y + t.radius); ctx.lineTo(t.x, t.y + t.radius + 15);
                    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.radius, 0, Math.PI*2);
                    ctx.fillStyle = t.color; ctx.fill();
                });

                if (gc.projectile) {
                    let p = gc.projectile;
                    p.x += p.vx; p.y += p.vy; p.vy += gc.GRAVITY; p.angle = Math.atan2(p.vy, p.vx);

                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
                    ctx.fillStyle = '#ecf0f1'; ctx.fillRect(-20, -3, 30, 6);
                    ctx.beginPath(); ctx.moveTo(10, -3); ctx.lineTo(25, 0); ctx.lineTo(10, 3); ctx.fillStyle = '#2c3e50'; ctx.fill();
                    ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(-35, -10); ctx.lineTo(-28, 0); ctx.lineTo(-35, 10); ctx.fill();
                    ctx.restore();

                    for (let i = 0; i < gc.targets.length; i++) {
                        let t = gc.targets[i];
                        let dist = Math.sqrt(Math.pow(p.x - t.x, 2) + Math.pow(p.y - t.y, 2));
                        if (dist < t.radius + 8) {
                            for(let j=0; j<15; j++) gc.particles.push({ x: t.x, y: t.y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1, color: t.color });
                            gc.targets.splice(i, 1);
                            setScore(s => s + 100);
                            gc.projectile = null;
                            checkLevelEnd();
                            break;
                        }
                    }

                    if (gc.projectile && (p.x < -50 || p.x > gc.width + 50 || p.y > gc.height + 50)) {
                        gc.projectile = null;
                        setAmmoLeft(a => { const na = a - 1; checkLevelEnd(na); return na; });
                    }
                }

                gc.particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= 0.05;
                    ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
                });
                gc.particles = gc.particles.filter(p => p.life > 0);

                gc.reqId = requestAnimationFrame(loop);
            };

            const checkLevelEnd = (currentAmmo = ammoLeft) => {
                const gc = g.current;
                if (gc.targets.length === 0) {
                    gc.currentLevel++;
                    startLevel(); 
                } else if (currentAmmo <= 0 && gc.projectile === null) {
                    setGameState('GAMEOVER');
                    updateStats(score, (Date.now() - gc.startTime)/1000);
                }
            };

            const getPointerPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: cx - rect.left, y: cy - rect.top };
            };

            const handleDown = (e) => {
                if (gameState !== 'PLAYING' || g.current.projectile) return;
                const pos = getPointerPos(e);
                if (pos.y < 80) return;
                g.current.isDragging = true; g.current.dragStart = pos; g.current.dragCurrent = pos;
            };
            const handleMove = (e) => { if (g.current.isDragging) g.current.dragCurrent = getPointerPos(e); };
            const handleUp = (e) => {
                if (!g.current.isDragging) return;
                g.current.isDragging = false;
                const gc = g.current;
                let dx = gc.dragStart.x - gc.dragCurrent.x;
                let dy = gc.dragStart.y - gc.dragCurrent.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > gc.MAX_DRAG_DIST) { let r = gc.MAX_DRAG_DIST / dist; dx *= r; dy *= r; }
                if (dist > 30) {
                    let vx = dx * gc.FORCE_MULTIPLIER; let vy = dy * gc.FORCE_MULTIPLIER;
                    if (vy > 0) vy = -vy * 0.5;
                    const p = { x: gc.width / 2, y: gc.height * 0.85 };
                    gc.projectile = { x: p.x, y: p.y, vx: vx, vy: vy, active: true, angle: 0, type: 'DART' };
                }
            };

            return (
                <div className="w-full h-full relative font-kanit" style={{ background: 'linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%)' }}>
                    <div className="absolute top-4 left-4 right-4 flex justify-between z-10 text-slate-800">
                        <div className="bg-white/90 px-4 py-2 rounded-xl shadow-md font-bold">SCORE <span className="text-orange-500 text-xl">{score}</span></div>
                        <div className="bg-white/90 px-4 py-2 rounded-xl shadow-md font-bold">AMMO <span className="text-green-500 text-xl">{ammoLeft}</span></div>
                    </div>
                    
                    <canvas ref={canvasRef} className="block w-full h-full touch-none" 
                        onMouseDown={handleDown} onMouseMove={handleMove} onMouseUp={handleUp} onMouseLeave={handleUp}
                        onTouchStart={handleDown} onTouchMove={handleMove} onTouchEnd={handleUp} />

                    {gameState === 'START' && (
                        <div className="absolute inset-0 bg-black/70 flex flex-col items-center justify-center p-6 text-center text-white z-20 backdrop-blur-sm">
                            <h1 className="text-4xl font-black text-yellow-400 drop-shadow-md mb-8">CARNIVAL<br/>MASTER</h1>
                            <button onClick={startGame} className="bg-gradient-to-b from-green-400 to-green-600 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-lg active:scale-95">เริ่มเกม</button>
                        </div>
                    )}

                    {gameState === 'GAMEOVER' && (
                        <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center p-6 text-center text-white z-20 backdrop-blur-md">
                            <h1 className="text-5xl font-bold mb-4">จบเกม!</h1>
                            <div className="bg-white text-slate-800 p-6 rounded-2xl w-full max-w-xs mb-8">
                                <div className="text-sm text-slate-500 font-bold">คะแนนรวม</div>
                                <div className="text-5xl font-black text-orange-500">{score}</div>
                            </div>
                            <button onClick={onComplete} className="bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-lg active:scale-95">สรุปผล</button>
                        </div>
                    )}
                </div>
            );
        }

        // -----------------------------------------------------------------------------------------
        // [MODULE 3] ATTENTION GAMES
        // -----------------------------------------------------------------------------------------
        function AttentionGame({ level, onComplete, updateStats }) {
            const canvasRef = useRef(null);
            const [score, setScore] = useState(0);
            const [lives, setLives] = useState(3);
            const requestRef = useRef();
            const itemsRef = useRef([]);
            const spawnTimer = useRef(0);
            const startTime = useRef(Date.now());
            const foods = [{ type: 0, icon: '🥩' }, { type: 1, icon: '🥕' }];

            useEffect(() => {
                requestRef.current = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(requestRef.current);
            }, []);

            const loop = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;

                ctx.clearRect(0, 0, w, h);
                spawnTimer.current++;
                if (spawnTimer.current > 60) {
                    const type = Math.random() > 0.5 ? 0 : 1;
                    const lane = Math.random() > 0.5 ? 0 : 1;
                    itemsRef.current.push({ x: lane === 0 ? w * 0.25 : w * 0.75, y: -50, type: type, lane: lane, id: Math.random() });
                    spawnTimer.current = 0;
                }

                ctx.fillStyle = '#fef3c7'; ctx.fillRect(0, 0, w, h);
                ctx.strokeStyle = '#fcd34d'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();

                ctx.font = '50px serif'; ctx.textAlign = 'center';
                ctx.fillText('🦁', w * 0.25, h - 50); ctx.fillText('🐰', w * 0.75, h - 50);
                ctx.font = '16px serif'; ctx.fillStyle = '#92400e';
                ctx.fillText('กินเนื้อ', w * 0.25, h - 20); ctx.fillText('กินผัก', w * 0.75, h - 20);

                for (let i = itemsRef.current.length - 1; i >= 0; i--) {
                    let item = itemsRef.current[i];
                    item.y += 3;
                    ctx.font = '40px serif'; ctx.fillText(foods[item.type].icon, item.x, item.y);
                    if (item.y > h - 80) {
                        itemsRef.current.splice(i, 1);
                        if (item.lane === item.type) {
                            setScore(s => {
                                const newS = s + 10;
                                if (newS >= 100) { updateStats(newS, (Date.now() - startTime.current)/1000); onComplete(); }
                                return newS;
                            });
                        } else {
                            setLives(l => {
                                const newL = l - 1;
                                if (newL <= 0) { alert('Game Over!'); onComplete(); }
                                return newL;
                            });
                        }
                    }
                }
                requestRef.current = requestAnimationFrame(loop);
            };

            const handleClick = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                for (let i = itemsRef.current.length - 1; i >= 0; i--) {
                    let item = itemsRef.current[i];
                    if (Math.abs(x - item.x) < 30 && Math.abs(y - item.y) < 30) {
                        itemsRef.current.splice(i, 1);
                        if (item.lane !== item.type) setScore(s => s + 5); else setLives(l => l - 1);
                        break;
                    }
                }
            };

            return (
                <div className="w-full h-full relative">
                    <div className="absolute top-4 left-4 z-10 font-bold text-yellow-800 text-xl">Score: {score}</div>
                    <div className="absolute top-4 right-4 z-10 font-bold text-red-600 text-xl">Lives: {lives}</div>
                    <canvas ref={canvasRef} width={window.innerWidth > 414 ? 414 : window.innerWidth} height={window.innerHeight} className="block w-full h-full" onClick={handleClick} />
                </div>
            );
        }

                                if (response === 'granted') {
                                    window.addEventListener('deviceorientation', handleOrientation);
                                    startGameFlow();
                                } else {
                                    alert("ไม่ได้รับอนุญาตให้เข้าถึงการเอียงเครื่อง ระบบจะใช้ปุ่มกดเท่านั้น");
                                    setUseGyro(false);
                                    startGameFlow();
                                }
                            })
                            .catch(console.error);
                    } else {
                        window.addEventListener('deviceorientation', handleOrientation);

                    }

                    window.removeEventListener('deviceorientation', handleOrientation);

            };

                    g.trees.push({ x, y: -100, type: Math.random() });
                }

                // Particles
                if (Math.random() < 0.3) {
                    g.particles.push({ 
                        x: g.car.x + g.car.width/2, y: g.car.y + g.car.height, 
                        vx: (Math.random() - 0.5) * 2, vy: 2 + Math.random() * 2, 
                        alpha: 0.8, size: Math.random() * 5 + 3 
                    });
                }

                // Update Objs
                g.trees.forEach(t => t.y += g.roadSpeed);
                g.trees = g.trees.filter(t => t.y < canvas.height + 100);
                
                g.particles.forEach(p => { p.y += p.vy; p.x += p.vx; p.alpha -= 0.03; });
                g.particles = g.particles.filter(p => p.alpha > 0);

                // Drift Logic
                g.driftTimer--;
                if (g.driftTimer <= 0) {
                    const direction = Math.random() > 0.5 ? 1 : -1;
                    const maxDrift = canvas.width * g.driftForceFactor;
                    g.targetDriftVelocity = direction * (Math.random() * maxDrift + (maxDrift * 0.3));
                    g.driftTimer = Math.random() * 150 + 100;
                }
                g.driftVelocity += (g.targetDriftVelocity - g.driftVelocity) * 0.015;

                // Movement
                let totalMovement = g.driftVelocity;
                const buttonSpeed = canvas.width * g.playerSpeedFactor;
                if (g.isMovingLeft) totalMovement -= buttonSpeed;
                if (g.isMovingRight) totalMovement += buttonSpeed;

                if (useGyro) {
                    let tilt = Math.max(-25, Math.min(25, g.currentGamma));
                    if (Math.abs(tilt) < 2) tilt = 0;
                    totalMovement += tilt * (canvas.width * 0.0006);
                }

                g.car.x += totalMovement;
                if (g.car.x < 0) g.car.x = 0;
                if (g.car.x + g.car.width > canvas.width) g.car.x = canvas.width - g.car.width;

                // Check Lane
                const laneWidth = canvas.width / 3;
                const carCenter = g.car.x + g.car.width / 2;
                const margin = g.car.width * 0.25; 
                const inCenterLane = carCenter > (laneWidth - margin) && carCenter < (laneWidth * 2 + margin);

                if (inCenterLane) {
                    // Update score visually every 10 points to avoid too many re-renders
                    g.score += 1;
                    if (g.score % 10 === 0) setScore(Math.floor(g.score / 10)); // Actually display score/10

                return inCenterLane;

                const laneWidth = canvas.width / 3;
                if (inCenterLane) {
                    const gradient = ctx.createLinearGradient(laneWidth, 0, laneWidth * 2, 0);
                    gradient.addColorStop(0, 'rgba(52, 211, 153, 0.1)');
                    gradient.addColorStop(0.5, 'rgba(52, 211, 153, 0.2)');

                    ctx.fillStyle = gradient;
                    ctx.fillRect(laneWidth, 0, laneWidth, canvas.height);
                } else {

                    const carCenter = g.car.x + g.car.width/2;
                    if (carCenter < laneWidth) ctx.fillRect(0, 0, laneWidth, canvas.height);
                    else ctx.fillRect(laneWidth * 2, 0, laneWidth, canvas.height);
                }

                g.roadOffsetY += g.roadSpeed;
                if (g.roadOffsetY > 80) g.roadOffsetY = 0;

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.lineWidth = canvas.width * 0.015;
                ctx.setLineDash([40, 40]);
                ctx.beginPath(); ctx.moveTo(laneWidth, -80 + g.roadOffsetY); ctx.lineTo(laneWidth, canvas.height); ctx.stroke();

                ctx.setLineDash([]);
                
                // Side lines
                ctx.strokeStyle = '#FCD34D'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(2, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(canvas.width - 2, 0); ctx.lineTo(canvas.width - 2, canvas.height); ctx.stroke();

                // Particles
                g.particles.forEach(p => {
                    ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = '#9CA3AF';
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();

                carGrad.addColorStop(0, '#D97706'); carGrad.addColorStop(0.5, '#FBBF24'); carGrad.addColorStop(1, '#D97706');
